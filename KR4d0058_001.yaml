  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0058_WYG_001-1a, image: WYG1099/WYG1099-0682a.png}
body:
  text: 無為集卷一宋楊傑撰古律賦歸來堂賦并序碧虛子陳景元字泰初初入道為右街録賜號真靖主中太一宫屢請歸廬山朝廷不從大丞相舒公因真靖自言而題之云官身有吏責觸事遇嫌猜野性難堪此廬山歸去來無為子楊傑蓋碧虛子之友也聞而歎曰昔靖節先生賦歸去來以歸廬山之陽且八百年矣其辭未亡罕有繼其聲者今大丞相因子之言而及之愛子之深也夫靖節逺害於汙俗真靖引分於治朝雖其去不同而所歸則一乃追靖節遺韻而歌歸去來以貽之庶亦自警云歸去來兮當太平之時胡不歸寵難處而易辱樂或過而生悲田園蕪兮不耨嵗月流兮莫追非彼馬而是是是我指而非非黼黻爛兮眩吾目塵埃坌兮緇吾衣不收視以返聽將安望乎希微胡為乎疲足孤輪與時競奔行不顧乎夜漏往取愧乎晨門余聞有其善者善喪外其身者身存享不俟乎牛鼎酌不假乎象樽內苟適其志願外何靦乎面顔一簞足以自養一枝得以自安車善行而無跡門善閉而無關動不離乎輜重超燕處乎榮觀河泝流兮九曲丹伏鍊兮七還師不陳而坐勝勇無取乎桓桓歸去來兮請從逍遙之遊委天與之定分在道外以何求有名教之真樂絶世俗之妄憂玩幾微於八索鑒福極於九疇齊物我而一致泛忘心之虛舟躡遺舄於子喬接逸袂於浮丘礪吾齒而潄石清吾耳而枕流投空谷而響應憩長林而影休幽鳥翔而後集白雲去而復留歲云暮矣何之叟擊壤以為期捨我田而營它徒勞力於耘耔子胡不歌大丞相之詩脫官身之吏責廬山歸去夫何疑一鶚賦雄鷙之物無有儔偶鶚也惟一物之至雄絶倫類於凡羽鋭擊搏於秋風一飛則沖得路昊穹之表獨立不懼肯羣燕雀之中在氣稟金於德為義力捕潜伏性鍾猛鷙由耿介以寡合非沽激而自異雖曰鵜如其狀孰並翺翔未嘗烏合其羣曲從黨比其或木落萬壑雲沈四陲我則助天地嚴凝之氣乘風霜肅殺之時鼓雙翼以直上摩九蒼而俯窺兔縱狡以難遁狐雖妖而盡追義可去者力皆擊之此天下以無雙少而尤貴彼鷙鳥之纍百多亦胡為目瑩星攢爪剛鈎屈飛騰而雄壓鷹隼擒獵而功高網罻宜乎孔融為表薦禰衡以興辭鄒陽上書諫吳王而託物大抵物之常者易其侶禽之異者難其儔故我不苟以合不旅而逰孤飛得以奮其勇離羣不足為之憂惟我獨清屈大夫之在楚出乎其類孔宣父之生周非不知生而飛鳴樂乎儔偶奈何彼不我類我匪其醜與其羣以無益孰若介然自守又何必提提若鸒斯之黨止賊夫糧嚶嚶為黃鳥之鳴過求其友勿謂毛羽爾盛朋儕我無殊不知丹鳯巢於阿閣大鵬迷於天隅子可類聚孰云德孤衆莫希蹤鄙翩翩之六鶂舉難接翼小泛泛之雙鳬噫得其時則架於軒楹失其遇則巢於林藪將伸勇毅之志願假英雄之手如欲禽異類而肅四郊於一鶚乎何有歌雍徹祭賦宗廟之祭歌雍以徹王享於祖禮終以時雍詩所以歌者祭器從而徹之周頌一章擇作永言之用宗廟九獻此為去饌之期成王以貴為一人祀兼七世歲或舉於祠禴時或行於祫禘且謂盡物盡志者孝子之事有始有卒者聖人之制當取正聲以尊先帝尸初以入必奏肆以迎尸祭及其終故歌雍而徹祭詩云至止肅肅有來雍雍祖考我格辟公我從有眉壽降祥之述節宰夫屏器之容篇本附於臣工詠而見意時因去其胙俎禮以為恭大抵詩不可廢廢之則闕祀不可久久之則䙝故我就靈宇以行事揚正音而後徹聲聞於外且非客出之初孝事其先用作神歸之節豈不以遷其祭器之謂徹播以人聲之謂歌徹焉造其禮之備歌焉報其福之多以樂為用非雍則何是以小師教於瞽矇職當諷誦君婦廢其籩豆音應純和惜哉周運否而大禮衰魯權喪而陪臣侈樂奉祖廟義同天子雖能享獻以自大莫測聲詩之所以故孔子謂來助有二王之後始可謳謠奚取於三家之堂徒彰僣擬則知帝威穆穆上德顒顒詩曲盡於辭意禮告成於祖宗且異夫率諸侯以祀文頌陳清廟就方丘而祭地吕奏黃鍾愚嘗因雍什之詠歌求詩人之微妙以為薦可用於廣牡禘可行於太廟及其徹也又從而聲之為萬世之典要周兼養老禮賦兼修三代養老之禮古之養老禮莫如周兼三代之常法新一王之令猷尚文德以唱風典章尤盛奉耆年而興教飲食參修昔自有虞訖於二代必重年德以均仁愛然而禮有質而有文事或興而或廢及周之治也古今之通制兼明而老者養之帝王之餘風盡在大抵燕者虞之禮饗者夏之儀太牢而食有商所為天下未有遺年者周人修而兼用之就膠庠以致勤高年畢萃順陰陽而為具異制同施莫不鼎俎豆籩牲牢酒醴考四代之異制萃一朝而為禮貴親尚齒德爵富雖曰殊風黑衣素裳深燕縞雜然在體至如樂之作也六樂並用學之建也五學相參而況養庶老而明廣愛事國叟而記高談得不比前世而文盛優上壽以恩覃尊耆艾於每年時凡有七嚴豆觴於一日事遍其三故得風始朝廷化流穹壤春夏焉先饗而後燕秋冬焉先食而後饗舜禹湯之盛事得以追修鄉國學之殊方各隨所養向非歧昌之德盛而大武發之功肅而嚴成王治定姬公思兼則何以設珍具以完備致蒸民之仰瞻且異夫禮用四朝記者美魯侯之盛文同三代史臣推漢德之炎則知兆民莫不親其親聖人惟能老其老推年齡以優事監古昔而順考孔子曰周郁郁乎文哉未必不由於此道不易之地家百畝賦多少之限因地豐塉歲不易者為美地地所美者善養禾惟君賜萬民之限凡家無百畝之過田居三壤之先靡虛其種戶給一㕓之廣敢益而多嘗聞田不授則倉廩虛食不足則民人夭故姬周平定甽畝頒分億兆然而為土有肥磽出物有多少利而或偏仁何以表是故再變易者三其地補生育之所虧不代更者一其夫防兼并之所肇大抵王錫以土民耕以時衆者不當過而寵寡者不可使之飢必在計夫家之費辨黍稷之宜以中地給六人之用下田供五口之資凡同居之七者擇上腴而賜之既殊休歲之疇常豐所利當限取農之數以授其私勿謂土之美也爾家不足與之耕勿謂齒之衆也其畝不宜使之簡況夫任土之法待其政生齒巳上書於版所養以之知所給因而限異漢臣之代甽農不定居如楊子之㕓田世為常産蓋夫瘠地之民勞以瘁沃野之俗逸而伸沃焉至多則太逸其俗瘠焉加少則大勞其民所以上上之田不廣蒸蒸之利將均虛一歲而虛二年誠非此類為前朝而為後市數若相因然後再易之間八家所治內以公田奉於國外以餘夫次其地猶有萊畝六遂之逺得而優不奪農時數口之飢無以至惜哉運革三代權分七雄井地一變民田不同或負郭以無仰或連阡而自豐夫豈知辨野而頒遂師之典彛得正數室而制司徒之法則從中後之君鑒古是非隨時沿革重孟子之經界鄙秦人之阡陌必也一丘甸以惠斯民損其豐而益其塉琴材賦桐之良者可以作琴世有嘉木天鍾至音抱良材而麗地俟哲匠以為琴中藏山水之聲能參大樂未偶斧斤之手獨秀喬林嶧陽髙峯龍門淵壑純氣所萃竒材以託宣情之具可以制間邪之操因而作時未我與工未我度固全天質自為物以混成安得梓人為發音於寂寞百尺之木特生之桐落落聳幹亭亭倚空無繁枝以示外蓄太和而在中時或裁成宜取羲黃之法人能抑按當移鄭衛之風正聲未揚識之蓋寡庸目雖衆視之或捨猶藏器之哲士俟掄才之賢者雖云陶令非取意於絃間又恐吳民欲為薪於㸑下俄有智者過而器之且曰堪輿之秀巖谷之竒激風霰於冬序感雷霆于夏時足以道舜民之樂足以伸椘客之悲如玉在山祕圭璋之重器猶金藏礦屈劍㦸之雄姿育質若然成功非我非鍾山之玉兮其徽曷稱非園客之絲兮其絃安可將致於用必陳於左然後欲天下之治者調其音而為表儀有君子之聽焉平其心而無懈惰是材之所稟用難自彰巧之所述器無不良儻工匠見遺不之翦而不之斫枝柯雖茂胡為宫而胡為商别有藝藪俊髦儒林綱紀明堂之柱此其選巨川之舟此其擬材乎材乎豈獨琴而巳哉冀匠師之明所以荀揚大醇而小疵賦周漢運否荀揚教傳雖曰醇之大者亦有疵之小焉皆命世以為文言非不粹與生知而較美道未能全嘗聞人異禽魚性鍾天地全而稟者曰聖哲偏而得者曰賢智聖無不通賢有未至是以周公尼父率臻大道之醇荀况子雲未免纎瑕之纍蜀國宗匠齊王老師雖抱重器不逢盛時欲卷道以自處疾沒世而無知由是簡冊其藴瓊瓌爾辭立大功於是矣未盡善者有之著書三十二篇義差而駮凖易八十一首理失而醨至如論性之淵源談道之極致或曰善惡一而混或曰理義皆其僞以禮義為僞則堯舜之法歸乎詐以善惡相混則鯀禹之心何以異兩賢於道擇不精而語不詳三子之間得其一而失其二又若對臨武以問兵之術推子淵以希聖之徒逺罪特愚於鼂錯談經私美於童烏是所謂珠不無纇瑕無掩瑜雖無傷于大義實有纍於名儒非倡道之子思將何以教美不臣之新室幾近於誣向使親承鄒魯之範模獲偶淵騫而論討然後善得以盡辨無不早數萬言皆造修途千百世以為至寶雜乎其雜當殊太史之書醇乎其醇可擬孟軻之道奈何智有失慮人無全能一則晦名於天祿一則朽骨於蘭陵俱有篆雕之雜難全粹美之稱亦猶務涉獵者賈山醇儒不足悅紛華者子夏具體何曾噫荀也倡之於前揚也和之於後助詩書禮樂之化謹父子君臣之守斯文未喪大疵則否何韓愈氏重而責之蓋責賢人也厚無為集卷一

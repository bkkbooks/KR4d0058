body:
  text: 無為集卷六宋楊傑撰律詩送張令同年赴嶺南滕王閣上正持杯候吏先期過嶺來澤國暫拋三徑菊春風須寄一枝梅昔年身到仁宗殿同日鱗驚禹穴雷萬里青雲有前約莫因藍綬歎塵埃劉純之以便親請還蜀通守臨川郡家山夢翠微願辭靈運史欲著老萊衣萬事樽前盡片心天外歸金烏伴征棹日日向西飛賦梅送黃庭方子行何所贈贈子一枝梅長共雪霜約故先桃李開清香隔年在和氣引春回上國人相問為言南嶺來贈朱漢臣先生德義輕軒冕有誰知所存清風滿淮國高節老巢門孝友敦兄弟詩書教子孫何當對明月林下接君言送陳成伯學士知湖州揚舲初出禁城東夾岸桃花蕊正紅紫綬朱轓金馬客清風明月水晶宫晝衣始信歸鄉貴夜鶴從教恨帳空政暇笙歌應鼎沸詩壇不用苦爭功送薑厚兄弟之子别庭闈鄉心夜夜飛芝蘭經嵗老鴻鴈傍春歸芳草隨征棹和風上綵衣鳴桹聲漸逺月滿釣魚磯送許常連年去鄉國從我赴南官一日學不廢雙親心自寬朝廷尚公正場屋進孤寒去去勿隕穫青雲翔羽翰和朝回二首官間無謁禁朝退自賔稀開卷逢先覺忘言接上機百千三昧悟四十九年非老矣陶彭澤浩歌胡不歸氣平無病惱心定覺身間禮局容尸素仙科玷潤刪馬駑猶勉駕鳥倦合知還舊隱廬山下蓬茅屋數間和酬致政朱殿丞挂冠清世詠歸田舟縱江湖養浩然水底病龍思致雨樹頭老鶴懶沖天詩因社友編三百酒為春風費十千今古辭榮人不少惟君知足最當年再和詩將曽持造化權何須功業勒燕然生涯書外都無物興味壺中别有天君解扁舟帆五兩我慙佳客履三千吾皇貴老多優賜好乞湖山不計年再和君賦江山數十篇人疑吟苦鬢皤然洞庭有浪寒欺晝太華無雲翠插天鷙鳥懦飛徒纍百疲兵重戰必當千席間莫訝賡酬速詩債從來笑隔年陳氏得開元佛殿梁材斫為琴傳三世矣而歸於太常少卿盛誨之請豫賦焉佛屋良材度中琴調絃安軫布徽金平時已入棟梁用終古更傳山水音陳氏得為三世寶啓期無負一生心太常密補巖廊化歌詠南風惠澤深晝錦堂功成身退正康強慿軾歸來晝錦光門外節旄交畫戟境中桑梓間甘棠兩朝將相經綸業千古絃歌禮義鄉父老未勞思再見聖君方眷股肱良遊藉田池館連雲晝掩扉晴煙冉冉日暉暉黃鸝映葉不肯去翠鳥得魚還自飛禾秀天田蔥犗卧花開仙苑粉牆圍白蓮徑裏歸來晚風送餘香欲染衣和酬赤松莊陳天貺花壓欄干木插天不知經始自何年為憐水石留終日謾拂莓苔寫數篇籠碧裁紗非我望梯雲名集自家傳氣蒸波撼多才思應笑襄陽孟浩然過鴻溝楚漢區區别土疆誰知盛德勝兵強乾坤混一歸真主郡國平分亦假王地底泉源通汜水道旁碑石屬滎陽如今四海都無外農入春田失戰場和謝聖藻遊錦川錦川亭上雨霏微太守齋航卷畫旗步入名園鶯慣見歌隨流水鷺驚飛憑高自有千峯聚飲劇方知萬事非卻恐丹陽赴官去此心當共白雲歸藉田集議以姓為韻甸師經始遇金穰禁籞清樽合奉常千畝方田開帝籍四時和氣聚神倉青壇改卜先農兆曲水交流上巳觴欲識漢家林苑富融融春澤浸長楊舟泊太湖區區朝市逐紛華不信湖心有海槎八十丈虹寒卧影一千頃玉碧無瑕古今風月歸詩客多少蓴鱸屬酒家安得扁舟如范蠡煙波深處卜生涯汝直松齋伊闕十五里唐朝三百年歲寒林木在王氏子孫傳門有登龍客風生飲虎泉丹方齊代刻龕像魏時鐫居士山長對郎君谷巳遷塔巍花繚繞溪淨竹嬋娟木記空陳迹烽臺息舊煙陸渾平獷俗八節穩漁船嗣絶傷宫傅碑亡歎鄭虔石樓延客醉天竺伴僧禪寓目鳴鑾地追懷奪錦篇白雲最深處約我詠歸田默齋喧喧人世事何窮燕坐深齋孰與同道義優遊言象外利名分付是非中紅塵無路到真境幽鳥有時啼晚風此意只應陶令會北忩琴在七絃空贈馮揚州天下無雙士淮南第一州文章老元帥節義古諸侯路穩歸黃閣功成建碧油九重致堯舜四海望伊周楚甸供吟筆吳兵賴坐籌風雲生鷁首蛟蜃怯龍頭有士依餘芘干時愧拙謀滄溟波浪險願借釣鼇鈎上知郡宋大卿縣弩曾陪竹馬迎清風千里畏神明三朝史榮推循吏九寺官班重正卿道氣養成髭轉黑民情照盡法從輕異時歸去黃金闕留得甘棠歲歲榮答宗臣佳章幽間外世緣白日抱琴眠詩就多驚俗樓居半是仙竹牀斜倚杖蘚壁倒垂鞭翻笑紅塵客馬頭韁轡牽和劉景文路分成考新春書一考舊學惜三餘弗厭詩情淡從教世味疏清時間將帥長日玩圖書愛我錦溪月約來相伴居和李義山盤豆館藂蘆有感盤豆蒼珉刻舊吟清風自可滌煩襟庭蘆邂逅開青眼澤國歸投是素心鄉夢不知家逺近世塗休問迹升沈陽春一曲一樽酒遮莫秋聲四面砧秀溪寒食十里喧闐錦繡川鞦韆人健趂飛鳶花明栁暗丹青國日薄雲濃水墨天遊女踐成芳草徑畫船衝散碧溪煙武陵謾説桃源好屈指如今幾百年夜泊偶書過得重湖日巳斜相依漁艇宿蒹葭故園水面一千里明月渡頭三四家客路漂流身似梗世途紛冗事如麻卻欣歸去逢寒食醉倒春風爛漫花和錢越州穆贈惠州弟燕集蓬山雨過涼湖光何獨負知章萬家桃李春風國兩郡旌旄晝錦鄉和樂豈煩鳴管磬醺酣非止為杯觴遙應大庾嶺頭去南北枝間梅子黃和酥花二章姑射山中氷雪膚造花慿仗箸頭酥生成自有神仙術點化亦同天地爐全用陰功催氣候不從凡土起根株頓教寒處萌春物鄒律回陽得似無一盤花卉鬭工夫孰謂真酥勝假酥白石萌芽生玉種寒林枝幹守丹爐縷金滴粉休隨俗翦綵粘膏近守株翻憶嶺頭梅帶雪使歸曾得信音無趙左丞畫像洪學祠堂寫六賢左丞功業最居先儀形已在凌煙閣豈獨丹青一郡傳魏徴君贊天子詔不起少微星轉明寥寥千載後富貴在清名趙賔客生日人間爵祿頌公難自有家傳一品官已亥年生逢巳亥從今甲子别開端老子度關圗送張會稽為夀祕藏函谷關中子持贈蓬萊閣上仙願得髭鬚如此老却教龜鶴羡長年無為子六年官太常江上耆老思得一見門人求京師名筆傳寫以歸因題之云江南江北白雲堆試共幽人一展開向道無為老居士擬歸先遣化身來申國吕公挽詞訃聞孰不淚盈巾寶鑑云亡社稷臣帝獵渭濵先得吕神還嵩嶽舊生申默調一氣歸元鼎坐致羣倫入大鈞孤賤無能報知遇文章曽許繼前人資政少保章簡公挽詞中道立不倚大哉王者言文章曽潤色功業在調元衮繡光閭里圗書遺子孫悲風起吳國千載鳯凰原得安肅顔舅書再成哀詞安肅書來倍痛傷痛傷窮苦盛時亡三千蟬蛻人何處十載龍山夢一場我愧動心非孟子誰能鼓缶學蒙莊夜臺難寄登科信淚滴春衫弔夕陽天章俞待制挽詩三首材與時相會聲華孰可攀東堂升祕籍內閣敘清班餘慶千年逺浮生一夢還故鄉聞訃日雲黯四明山熙寧治百川獻議闢民田平昔不毛地于今大有年至忠期報國上策在安邉士論追賢業臨風一泫然節制當方面恩威號令明黠羌知效順叛俗乞歸耕一夕流星隕中年逝水傾祠堂嚴嵗享耆舊致精誠無為集卷六

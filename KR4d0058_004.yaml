front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0058_WYG_004-1a, image: WYG1099/WYG1099-0696c.png}
body:
  text: 無為集卷四宋楊傑撰古詩豐湖歌惠州風土隔世埃使我南望長徘徊昔年霹靂轟蓬萊六鼇踉蹌海面開一峯崒屼九霄落萬里怒濤推擁來至今浮在羅山畔玉閣石梁插天半世人可見莫可登雪棧雲梯知幾層近聞更有豐湖好環匝亭臺映洲島野叟忘機鷗鷺間寒潭無浪蛟龍老雲歸洞府月滿灣客卷綸車魚在藻白玉抽苗萬蓋圓翠光期壓王孫草天髙日暖荔枝香風撼一川紅瑪瑙主人丹鼎飛金虎豐湖無根豈能住一日地軸如走丸隨逐浮山還舊處謝公約惠墨竹圖幽人漬墨寫成竹變化琅玕作玄玉公約贈我兩大軸不比丹青凡草木六月都城苦炎燠車馬紛紛正馳逐曲臺官冷晝掩關淨掃虛堂展霜幅簾間忽有微風來不動纎枝清滿屋憶得扁舟載雪時曽寄會稽江上宿和謝判官宴南樓邂逅南軒須水濆名言間發蘭桂芬道義相投有餘樂賔主交照無繁文忠臣寤寐在北闕古風歌詠追南薰出關不覺行役苦舉頭時見孤飛雲送李辟疆李辟疆濡須别我逰池陽别後不得信不覺青女三飛霜每見世俗仇讎杯觴桎梏文章憶君酒怪吟狂往往登髙岡但見大江水茫茫九華峯青蒼使我增悲傷明堂禮後一百二十日忽騎蹇驢訪我來池陽倒覆我巾箱得我弊藁數十張索我狂書八九行告我明日逰帝鄉我知利民術君心十年藏青雲一萬里此去髙翶翔白月池鑿池待明月池成月自來一從幽人去明月來幾回乳竇走龍蛇斷崖激瓊瓌安得藉磐石泛我癭木杯留題張尉隱齋小隱隱林藪大隱隱朝市市朝心隱不隱身山林未必忘名利夜來月明竹聲細隱齋主人留客醉四更客未醒主人促車騎客笑主人勞不顧隱之意君不見梅福曽作尉民官莊周亦為漆園吏酒隱園小隱隱山林大隱隱城郭城郭多紛囂山林苦淡漠不如隱於酒適意自斟酌屈原不能飲獨醒較清濁揚雄雖願隱載醪無適莫吏部甕下卧其隱可愧怍翰林市上眠其隱太落拓孰若畸翁園醺酣得大樂風暖鳯凰集霜重梧桐落長嘯待明月明月出林薄倚杖傲浮雲浮雲度寥廓雖近市朝路不為名利縛知我尚幽勝賦詩豫期約願言醉鄉逰一駕東飛鶴上池沃瑶漿沖氣溢金杓當知隱君子志不在糟粕及第東歸逢元舉與君去嵗金陵逰七月十日離楚州酒闌浩歌古亭下白日雷雨催行舟片帆乘風破險浪冉冉飛過蘆花洲我時幸預鼇頭薦君以才術公卿留人生聚散散或聚忽忽今會如萍浮君行何以贈君别莊鵬九萬摶髙秋丞相王舒公贊天子元老坐而論道赫赫具瞻傅巖惟肖都尉王居士贊珠圎而明玉澤而溫鑑瑩徹而絶塵芝秀發而非根曼殊沙華栴檀香芬晦堂路險大開施門西江水深一口平吞誰知威音已前正是王老師孫三江魯府君贊三江府君有德有文善政及物隂功惠民異木連理雙芝共根詩助風教道傳子孫斯人一去莫可見萬里西山空白雲治平三年秋七月當塗郭功父招無為楊次公會於環峯時五雲叟陳德孚以詩寄吾二人因聯句酬之空山坐寥落匹馬邀俊哲入門肆髙談清風掃煩熱功父憶昔治平年姑熟溪上别歲時激箭急倐忽三十月次公讀書非少鋭欲論先卷舌歸田殊未成纍纍逐羈紲功父孰謂趙魏老不能佐滕薛由來歲大寒松柏見孤節次公朋心久愈至忠規補殘缺兒童喜父執飣餖成羅列功父壺有玉泉酒庖有冰裙鱉野芡剖珠璣秋瓜咀霜雪次公新粳刈且舂香炊軟三淅放七聊醉飽百憂旋磨滅功父升平擊堯壤險怪探禹穴吐氣直虹霓落筆淬金鐵次公詞源河漢翻俯視隄防決文章貴天成追琢譏竄竊功父抵掌萬古事高下爭蟻垤挹酌華陽水蕩滌塵土咽次公吾心了何染本理忘巧拙聖賢久不作情偽愈分别功父竹陰卧片石浩歌聲欲闋山童倐及門喜音屈高潔次公傳聞脫世纍天境妙搜抉疏簾卷危閣九峯青嵽嵲功父吟餘琴一弄鏗然響環玦老鶴不敢鳴十里飛雲絶次公次公君素交嗟豫尚契濶疇能枉籃輿相期出寥泬功父崔仲嶽隱居松江以丹白黑飾舟曰鶴舟括蒼周子韶無為楊次公治平三年夏六月會仲嶽於繁昌蓬萊亭勉其罷鶴舟以應書席上聯句送之且就飛龍榜休登白鶴舟子韶隴書方勸駕閬苑莫回頭次公丹頂歸滄海霜翎擲素秋子韶海鵬期變化仙驥任沈浮次公煙月間三島功名重五侯須知馳鳳詔便是釣鼇鈎子韶巳得沖天便無思擊楫遊次公楚醪鏗逸韻湘瑟助𡨕搜子韶南浦成春别北山空夜愁九臯聞象魏一葉寄汀洲次公世氣騎風虎機心走海鷗子韶昔年嗟鷁退今日並麟遊次公八月仙槎駛千齡聖運優市朝真大隱箕潁謾清流子韶鼓枻雖漁父乘桴笑仲由片帆從此卷舊氅亦應留次公冠珮重華國鶯花四皓樓雄文高鴈塔大醉憶蓬丘子韶勳若書青史幢須建碧油蘭橈好重舉乘取上揚州次公送沈漢卿拜母墓效孟體慈母冢前柏孝子眼中血根在葉長青恩深淚難歇二月黃鶯鳴一路玄猿咽牛渚磯修水府祠并序牛渚磯在太平州之北里即溫嶠燃犀之所也石岸險隘江流湍激頗為舟楫之害中有水府祠南唐保大年封其神以王號國朝祥符中從而加封舟人將過之必先陸走具牲幣以禱焉及慶厯初朝命開新河於磯後而獲安濟則禮事稍損祠宇多敝嘉祐七年章太守命修之傑因賦之且警來者牛渚磯大江洶洶山險巇舟人欲渡不敢渡烹牲投簡先禱祈自從疏派得安濟禱者漸踈祠宇隳我聞鬼神若君子不以風濤為福威吁嗟人心自險易昔也兢兢今也違太守修祠豈無意寄語安者毋忘危至遊堂人孰不好遊外物常求備佳勝窮山海紛華樂朝市不知務內觀未得遊之至達士靡窺牖天道已昭熾六合極周流萬化覽要會瀟灑須川守名堂慕髙致政清民訟簡庭木交蒼翠間關林鳥鳴跳躍池魚戲逍遙成詠歌吏隱欣得地視聽與人同所適與人異翻笑列禦寇不出終身愧吾亦愛吾廬豈獨壺丘氏無為集卷四

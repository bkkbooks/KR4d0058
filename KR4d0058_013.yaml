body:
  text: 無爲集巻十三宋楊傑撰墓誌故劉之道狀元墓誌銘之道諱輝信州鉛山人也少䘮父母耻家世湮汨慷慨去鄉里卓然有自立之志從師學問八年有成一試冠國胄再試冠天府士天下以是知名嘉祐四年春仁宗皇帝試禮部貢士於崇政殿又擢之道爲第一先是皇祐至和間場屋文章以搜竒抉怪雕鏤相尚廬陵歐陽公深所疾之及嘉祐二年知貢舉則力革其弊時之道亦嘗被黜至是歐陽公預殿廷考校官得程文一篇更相激賞以奏天子天子稱善迺啓其封即之道之所爲也由是場屋傳誦辭格一變議者既推歐陽公有力於斯文而又服之道能精敏於變也釋褐授大理評事簽書河中府節度判官事迎侍祖夫人赴官夫人以生於南方不習風土間或不懌之道曰迺某自立志在顯親不幸少失怙恃追養不迨尚幸祖母康寧得以承其志今反志意不懌豈子孫之心也哉遽白府請解官侍親府爲具奏詔移建康簽書節度判官事所以便其養也未㡬改著作佐郎七年夫人卒之道號慕盡哀以適孫自陳乞解官承重服時府尹龍圖王公贄重惜其去而固留之之道固不從公即遣使者謂之道曰按著令凡適孫爲祖父母承重者蓋其適子無同母弟以承其重者也今君雖於祖父爲適孫而聞先君有同母二弟已自服䘮奈何遽以解官而承重服乎使者及門之道方伏廬哀號徐扶杖而起謂使曰輝聞支子不祭祭必告於宗子所以重正適而尊祖考也後雖未能盡蹈典禮而䘮事敢不勉乎况國朝封爵令文諸王公侯伯子男皆子孫承適者傳襲若無適子及有罪疾則立適孫無適孫則立次適子之同母弟且貴賤雖殊正適之義則一也豈有處貴者之後則封爵先於適孫在凶䘮之際則重服止諸叔父耶爲我重謝龍圖公毋固留也公以其事奏朝廷朝廷下禮官議以爲然乃聽其去有國以來適孫有諸叔而承重者自之道始也扶靈歸𦵏於鄉里哀慕盡節州閭稱其孝㑹數世族人有貧而不能為生者乃買田數百畝以聚之晨昏歲月饗給周足縣大夫爲易其地名曰義榮社之道居䘮未嘗一造郡縣四方士人從學者甚衆乃擇山溪勝處建舘舍以處之日講誦乎其間縣大夫又名其館舍曰義榮齋皆所以厚風俗也服除赴闕道繇真州以治平二年春三月十有三日感疾而卒享年三十有六祖諱某父諱某皆隱徳不仕之道性和易接人必盡誠不尚矯飾士樂與之交供備庫使白君文質以其子妻之男一人女三人皆幼夏四月其季父自鉛山來當塗且曰吾家猶子與子有年籍之契而校誠尤厚昔以先伯氏之銘託於子矣吾家猶子亦嘗為濡須府君之銘矣今將卜某月某日𦵏於義榮齋之右子其爲我銘之迺泣以再拜傑再拜以泣曰敢不從命迺為銘曰琢玉為璧璧成而缺琢玉爲圭圭成而折厥寶至重不獲其用嗚呼之道不得壽考故朝散郎致仕朱君墓誌銘君諱定國字興仲姓朱氏其先成都人世仕偽蜀高祖贇僉預吏選從曽祖某典宫門之禁随孟氏入皇朝終京西轉運使自是族人東徙曽祖詢祖益皆自晦不仕父杲故任孟州河陰縣令累贈銀青光禄大夫母傅氏累封清河郡夫人銀青蚤世清河夫人挈諸孤寓無為郡之廬江君方八歲家貧借書讀兄弟自相傳授敦尚節操不妄與人交慶厯二年中進士第授池州貴州主簿以平反死獄遷饒州軍事判官時太守暗酷政出其子官吏多憚之君曰公則從不公則不從何憚之有守屢欲害君君方正自持終不能屈浮梁邑劇訟多吏貪令弱部使者委君攝令事君至而鋤其姦境内稱治於今稱之官滿當改秩銓吏曲為沮抑剡薦不如令君詣銓長求直長固執如吏議且曰在官曷不多求薦君曰平生未嘗有所求必以爲不可則已乃調梓州觀察推官改著作佐郎知廣德縣民有訴旱郡遣官按驗民乃聚衆持梃千餘來覘勢若脅官吏太守戒捕盗官具甲兵以衛之君曰愚民無知妄意蠲賦爾若過計張皇恐因縁生事縣令請自行於是輕騎從者數人以往衆聞乃潰去時按田官尚匿僧舍不敢出君擒首謀數輩送郡黥𨽻之餘不問也人服其識境内有靈濟王祠江左人欽事歲殺牛數百以祀之君至且戒止民未甚信父老告於廷曰神禍福影響苟易其牲何以逃咎君曰牛者稼穡之資殺有常禁神以庇民為惠將䧟民有罪而享其牲神必不然父老益懇懼君曰民欲殺牛而享不聽者令也神之福宜歸民譴宜歸令必欲用牛當生致於廟廷官為貿錢以備祠費父老欣然從命廣德不殺牛以享神自君始也未及代丁清河憂服除改秘書丞知廬州合肥縣神宗登極改太常博士賜五品服改尚書屯田員外郎知六合縣時朝廷方興水利有建議開馬昌河通滁州者提舉官從之君以為壞民田廬甚衆工費亦大而所為利無㡬固以為不可乃移君他局屢委官覆視之不能變君議使者以君首沮所論數移他局以困之君因請於朝願得管庫以便其私而他使者知君奏留不行君嘆曰居可以仰禄而不知我者數見困去可以逺害而知我者反見留吾命其窮哉直道以利民殆不可為枉道以全身非我志也因請致其政而歸時年六十有一齒髪未衰筋力猶壯士大夫高之元豐四年官制行改朝奉郎今上即位覃恩改朝散郎賜三品服著令京朝官致仕歴任有勞績則以全俸寵之公以貴池雪活之故可應格或勸君自陳君曰吾勤勞􅕄事夙夜匪懈猶懼無以報廩禄之賜今竊半俸老田里又得一子禄養恩已厚矣敢較其他乎竟不言以元祐四年七月初一日終於私第之正寢享年七十有九娶王氏封太原縣君子男三人長曰裒壽州壽春縣令先公一年卒其二人皆早䘮女三人長適鄉貢進士建安張思次適通直郎延平葉唐懿次適陽武主簿太原王嵤孫男三人長曰耆次曰某次曰某女孫二人尚幼以是年九月乙酉𦵏於臨潜鄉申家山之西近先塋也君質直信道篤於孝友所至以公亷稱言行莊重非義者憚之至老手不釋巻凡論漢魏以下至國朝人物賢愚忠佞言行之迹歴歴可聽尤好為詩喜愠悲憂一於詩發之格尚平淡在編軸者數百首著歸田後録皆耳目所接朝野可載事以備史氏之遺士大夫多傳之又取近世禍福之應其理可推者百餘事次之以警俗謂之幽明雜警云君初與其兄巢門先生某及其弟秘書丞某皆以文行清節著聞至致政時巢門先生尚康强兄弟白首文酒相從於鄉里者二十年搢紳慕焉銘曰賢哉興仲諒直自守篤學從仕材不命偶聽獄求生宜其有後祠牛不烹利溥且久知止不辱勇於解綬浩歌歸來兄弟耆壽燕樂田里益敦孝友道有通塞名也不朽故桂州司法趙君墓誌銘君諱隆字夷仲河南洛陽人曽祖考諱孚皇任殿中侍御史贈太師中書令祖考諱安仁皇任御史中丞尚書右丞兼宗正卿贈太師尚書令兼中書令魏國公諡文定考諱温瑜皇任少府監贈吏部尚書家世以忠孝德義相傳薦紳推以為法君葢尚書公之第三子也慶厯元年用奏補太廟齋郎皇祐三年調江陵府户曹參軍秩滿丁尚書公憂嘉祐四年再調曹州司法參軍治平元年移絳州稷山令未之官丁母賛皇郡太君李氏憂四年以三司户部判官張徽舉監泗州在城清酒務熈寧五年任婺州浦江令爲政明恕不務苛細邑人便之時浙右大歉君賑恤有方而民頼其賜元豐元年以兄大夫公領憲湖外疆境近於桂管迺調桂州司法參軍二年十一月十二日無疾卒於官享年五十有五君幼而聰敏長而好學其愷悌孝恭葢出天性内外親友無不愛之平居宴然不妄喜愠家雖貧而亷於求官雖卑而恬於進人或勉之君曰富與貴人所欲也不有義命歟議者稱之君雅愛篆學樂於吟咏然未嘗輙以示人故知之者鮮嘗謂弟曰吾平生不敢為惡得免疾苦而終幸矣後果如所言娶吳氏大理評事諒之女男五人濤淳源淮濛舉進士濤淮皆先君而卒女三人長適進士李峒次適進士劉載用一在室元豐四年冬十有一月某日𦵏於洛陽龍門某原祔尚書公之塋禮也諸孤託彭澤令張在述君行狀求予銘其墓予忝葭莩知君懿行為最詳義不得辭銘曰孰不欲富吾亷於求孰不願進吾敏厥修有義有命誠心所存吉士夷仲文定公孫故臨淮隱者贈大理評事杜君墓誌銘某年月日臨淮隱者杜君卒有德而不自顯之謂隱孝以事其親順以事其長正以率其家義以教其子惠以及其鄉君所有之德也淮水之南淮山之北喬松脩竹白雲寒泉君之隱居也既有是德而不自顯矣則朝廷曷得而官之以其子而顯也君諱某字某其先君卿在唐為濠泗等州觀察使因家於臨淮後遂為臨淮人君之曽祖某官諱某祖某官諱某父某官諱某皆積德行義有聞於時君壽六十有二夫人朱氏賢和而孝能輔成君子之徳贈某縣太君壽八十有六而終子二人曰某曰昺昺舉明經中第清慎賢明為薦紳推重以太子中舍辭知彭山而為金陵庾官所以便㐮事也嘉祐五年得告歸以冬十月某日卜𦵏君及夫人於臨淮郡之某鄉某原且以銘誌見託不獲譲云銘曰淮山峻極君德之積淮水湯湯君慶之長山水之間以固以藏故鄒君墓誌銘君諱澥字深之其先東魯人源深派逺後有徙居臨江郡之新淦者大理評事諱顯曽祖考也府君諱衮祖考也袁州助教諱夏考也信義相傳閭里以為令族君幼業文長益精博為流輩所稱屢舉進士不為有司知既孤以至孝事其母晨夕不敢離左右一日謂人曰士不可以不求進進而不為人所知命也安能捨予采衣之樂而汲汲求知於人哉乃罷進取一志於養就所居之西臨水面山為采真閣每侍親登覽燕集其上佳木繁翠野芳幽芬煙雲巻舒魚鳥上下真得天下之至樂與夫奔趨禄利汩没塵土不得朝夕在於親側者葢有間矣平生介潔屛耳目玩好唯樂聚書力教諸子以大其門熈寧元豐中天子興太學長育天下英才君敦遣其子以就教喜謂族人曰此吾兒亨進之時也及其子自太學登第歸聞者莫不服其高識君謹厚寡言寛恕容物未嘗矜已所能揚人之短親戚交舊賙給不匱人有患難則力以濟之唯恐不逮鄉閭以長者稱之人有勸多營田園以厚子孫計君曰田園之利孰若義之益耶人以為摯論元祐元年正月一日感疾終於家享年六十有八娶廖氏生男子三人曰洵仁洵武洵美皆舉進士有學行洵武先登第任鄂州司户參軍女一人適鄉貢進士吳游宗廖氏亡繼室陳氏孫一人女孫二人尚幼以某年月日𦵏於某鄉某里某山之原其子具書以江夏謝令岐叙君行實自江東走介來京求予銘其墓云銘曰仕不可必退以修身孝以見志篤於事親詩禮之訓肅雍閨門善積之慶以貽子孫故西頭供奉官監無為軍𣙜貨務兼兵馬監押郭君墓誌銘君諱元方字天益唐尚父汾陽王之後今為京師人曽祖考諱彦欽謹厚有器量藝祖少時善遇之而有通財之義及藝祖龍興故人多暴貴而獨隱遁不自耀特詔起之後任慶州刺史𣙜鹽使逮事太宗防邊屢有功所至稱治祖考諱勲補都使不樂仕宦老於家考諱坦知寧州不禄贈大將軍妣劉氏封彭城郡太君繼母向氏封鉅鹿郡太君君好學多能少而有立初舉進士未第而將軍没於嶺外朝廷推恩補殿侍景祐中改三班借職董役河上有績效寶元中任蘄黄按轄馬遞及州界巡檢權本州兵馬事屢獲强寇改奉職為制置使奏辟監潭州船場權本州兵馬事本路使者舉充橋口水陸都巡檢慶厯中蠻獠宼境荆湖南路安撫使選用君於衡州耒陽山下分領援兵䇿應擒捕君靖深有謀上下頼之及凱旋授右班殿直續改左班朝廷選送遼國人皇祐中任宿州蘄澤兵馬監押獲盜及逋卒百人境内肅然種榆栁三十萬河堤為之完固薦者稱君之勞首冠諸邑被㫖陞優最嘉祐中三司奏辟監無為軍𣙜貨務兼兵馬監押時茶法久弊課額大虧及君赴官究思弊源招徠商賈未周歲常數大増其溢額者五十八萬緍賊盗屛迹邦人安堵㑹茶法通商罷𣙜貨務邦人投牒本部願留君專領兵馬事官滿將去邦人又請留之本部為具奏朝廷皆見允連任十年改左右侍禁西頭供奉官生平薦者自丞相劉公而下三十餘人皆當時名公也治平元年三月六日感疾終於無為官舍享年若干夫人李氏賢淑有法度親族稱之男子二人長曰昪次曰曦皆應進士舉二女長適左侍禁張宏次適供奉官戴招信君性和易臨事精敏奉親篤孝兄弟友愛其擒兇禦宼則有過人之智遇人急難則力以濟之蓄書數千巻以教其子弟好藏古今名書畫及珍異之玩每延嘉賔客則出之燕間喜於丹青遇物能寫曲盡飛動之意信天下之絶筆也宣徽王公洎諸文士多以序引歌詩紀其妙君所至有勞效而不得盡其施設知者惜之元豐三年某月某日卜𦵏於泗州盱眙之三角山其子昪以銘來請銘曰汾陽裔孫鎮寧嗣子慎以行已敏於立事㓂盗屛畏民以之頼職業允修去有遺愛盱眙之山下有流水以固以藏百千萬祀故朝奉郎守殿中丞梅君墓誌銘君諱正臣字君平南唐末曽祖逺為宣州掾祖邈贈尚書刑部侍郎父譲贈尚書職方郎中從父詢景祐間任翰林侍讀學士給事中遇郊祀恩奏試將作監主簿時方力學鋭進累預鄉舉以親長之命不敢辭也始調舒州懷寧縣尉次歙州績溪尉秀州嘉興尉以勞遷和州防禦判官君所至以公忠自信慷慨敢為於舒修完吳塘陂灌溉民田數千頃人以為利秀之華亭有鹽數十年積若山阜不能發君請疏漕渠因海潮運載至城下公私便之軍賊王倫聚黨數百自青沂至淮楚長驅㓂掠州縣為之騷動時歴陽守倅未到任君獨當郡事迎送之餘疲卒纔數百輩計不足以禦賊君乃募土著丁壯相與誓死守城力戰於是倫及其黨皆就擒伏誅若其脅從者並從寛宥時文忠歐陽公守滁聞之顧謂僚佐曰倫長驅郡縣梅君平於談笑中擒之其材智豈易得哉因辟充幕官郡事多得其助官滿以文忠公威敏孫公樞宻直學士王公洎部使者十餘人交薦於朝廷遷秘書省著作佐郎知廣徳軍廣徳縣事未㡬丁職方公憂服除知宣州南陵縣事南陵素號多訟田制不明君至先爲造版圖正經界吏畏民服囹圄為空改太子左賛善大夫還朝改殿中丞至和初京師久雨畿内諸縣水潦為害朝廷擇官分治之君首被選用乃自陳留以東晝夜冒雨行數百里相視決泄人無墊溺之患比它治為最優出知泗州臨淮縣事至則修教令立威信盗不入境明年榖不登未及賑濟而汚吏欲以惡濕麥數萬石散之民間約一歲而斂之君以其實白於部使者願無以此麥撓民且惠姦使者以為然乃按受納之弊其不悦君之言者陰使人訟君催科苛酷遂被劾去官時母夫人年餘七十自侍奉還鄉里日與諸親戚相見志意愉懌勝在它郡時君乃謂所知曰我從仕以來多承命出入不得在親之側常不足於所懷今親且老矣安敢以游宦為意哉於是緝治先構鑿池種竹手植花果百餘品日引兒孫奉版輿嬉樂於其間不知外物之可欲也比終母夫人䘮即年及從心矣遂不再仕識者稱之君性沖淡學問贍博少時與伯氏聖俞唱和詩章為前輩所推自退居以來杜門燕閒唯以㫖甘爲事未嘗以纎毫干於人其所為文詞亦未嘗輕示不知者其耿介如此君雖高年不倦探討因其子得書數百巻歸而喜過於獲珍且繼晝夜以讀之不踰月而終篇其好學如此元豐五年中元日終於家享年七十有九先娶衛氏再娶王氏得輔君子之道男子二人長曰宰任承事郎知江寧府江寧縣事次曰衆累舉進士有司優第其文女子五人長適淩湛次適朝奉郎通判杭州李孝先次適江寧府溧水縣尉王良肱次適曲孜次適杜煒孫男七人京充端雍亢章㐮方幼學以元豐六年正月丙午𦵏於宣城縣長安鄉惠照之東原是月遣其外孫前知南陵縣事王鑑具行狀來求銘銘曰梅氏之興盛於宛陵自金華公世以文稱嗟嗟君平慷慨敏明交薦於朝鉅公名卿誅滅㓂黨脅從罔治分决積潦首稱其利完陂灌田人䝉其惠乘潮䟽漕運以之濟晨昏庭闈承順志意輕禄重養孝子之事心無所欺退亦何愧刻石墓門昭示來裔無爲集巻十三

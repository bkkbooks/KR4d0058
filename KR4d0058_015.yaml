body:
  text: 無為集卷十五宋楊傑撰奏議奏請四皇后廟升祔狀右臣先曽上言伏為皇后廟四室第一室孝惠皇后賀氏第二室孝章皇后宋氏第三室淑德皇后尹氏第四室章懷皇后潘氏孝惠皇后太祖首納之后也淑德皇后太宗首納之后也章懷皇后真宗首納之后也並遇初潛嬪於帝室正位乎內王化所基生享禮封後行追冊孝章皇后在太祖之朝已母儀天下及太宗即位號曰開寶皇后以上四后順德徽音見於彤史奉安别廟薦享有常升祔之儀久而未講每遇禘祫則遷神主設席於太廟本位帝主后主之次雖云合食其實異牢禮意人情有所未盡或者以謂孝惠淑德章懷三后生無尊稱沒加盛禮難以升祔太廟臣謹按國朝㑹要禮閣新編所載懿德皇后符氏開寶八年崩亦在太宗登極之前至太平興國三年方行追冊今已升祔太宗廟室况又孝章皇后在太祖之朝已正中壼而母儀天下乎伏請比用懿德皇后禮例升孝惠皇后孝章皇后祔於太祖皇帝廟室升章懷皇后祔於真宗皇帝廟室所貴嚴升配正始人倫推廣孝思風化天下奏入已久未䝉付外施行今伏見慈聖光獻太皇太后上仙山陵有日陛下以嫡孫號慕過哀外示易月之文而實遵三年之制謂園陵有所謙抑故隆以因山謂諡法未足形容故增以四字權宜祥禫之服却而不御公卿羣臣表章七上而始得瞻望更朝又表章五上然後勉從正殿之請每降手詔發揚太皇太后仁聖功業莫不出於至誠感動天地自載籍以來天子孝德未有過今日也將來九虞禮畢則崇配於仁宗廟室臣愚不避誅殛再敢上凂天聽伏乞陛下擴充不匱之心等而上之至於祖宗后廟因慈聖光獻崇配之日升孝惠孝章淑德章懷四后神主祔於太祖太宗真宗祏室斷天下之大疑正宗廟之大法以垂永久不勝至願其升祔昭穆准淳化元年勑宜依舊懿德皇后在淑德皇后之上又咸平三年勑孝章皇后宜在孝惠皇后之下又祥符五年勑禘祫之日孝惠孝章淑德三皇后神主祔饗於太祖太宗本室次於正室又祥符六年言者請以元德皇后神主升祔在懿德皇后之上真宗詔曰載念尊親蓋惟極致在乎陟降非敢措辭惟以祔廟之歲時用為合享之次序宜恭以元德皇后神主祔於明德皇后之次至慶厯元年言者請以章懿皇后序於章穆章獻皇后之上仁宗詔曰祗覽祥符之詔深原文考之㫖極意尊親之際重形陟降之辭故以祔廟之歲時用為合享之次序義無差别情無重輕恭依禮官所議奉章獻皇后章懿皇后序於章穆之次是致慶厯祀儀凡行禘祫皇后廟神主並設席於太廟本位帝主后主之次永萬世不易之典也如䝉允臣所請其升祔昭穆即乞依三朝詔㫖及慶厯祀儀熙寧祀儀施行謹具奏聞伏候勑㫖禘祫合正位序議右本院先准中書劄子奉聖㫖修定太廟祀儀續准近制奉僖祖為太廟始祖所有禘祫神主合正位序檢㑹禘祫舊儀於殿室外設昭穆之位僖祖翼祖太祖太宗仁宗及諸室后主共十四位俱南嚮順祖宣祖真宗英宗及諸室后主共十位俱北嚮所有禮樂之器多陳設於堂之上下而皆在北嚮神主之後質之典禮參以人情竊恐未順謹按禮記周禮經傳及爾雅通典禘祫志三禮義宗所載禘祫昭穆蓋有室中堂上之别古者宗廟異宫各有堂室户近東祏主在西其在始祖后稷廟室則后稷東向其為昭者皆南向其為穆者皆北向在太祖文王廟室文王東向以率先王之穆穆皆北向在太宗武王廟室則武王東向以率先王之昭昭皆南向各就其室祼酌饋獻此所謂室中之位也及其迎之出户射牲燔燎朝事朝踐則后稷文王武王皆南向先王先公其為昭者皆西向其為穆者皆東向此所謂堂上之位也遇祫祭則先王先公合食於后稷之廟明堂配上帝議謹按周禮掌次職曰王大旅上帝則張氈案祀五帝則設大次小次又司服職曰祀昊天上帝則服大裘而冕祀五帝亦如之明上帝與五帝異矣則孝經所謂宗祀文王於明堂以配上帝者非可兼五帝也考之易詩書所稱上帝非一易曰先王作樂崇德殷薦之上帝以配祖考詩曰昭事上帝聿懷多福又曰上帝是祗書曰以昭受上帝天其申命又曰惟皇上帝降衷於下民如此類者豈可皆以五帝而言之自鄭氏之學興乃有六天之說而事非經見至晉泰始初論者始以為非遂於明堂惟設昊天上帝一坐而已唐顯慶禮亦止祀昊天上帝於明堂今大饗在近議者猶以為上帝可以及五帝臣等請如聖詔祀英宗皇帝於明堂惟以配上帝至誠精禋以稱皇帝嚴父之意奏請罷文德殿常朝官狀儒林郎守祕書省著作佐郎充太常禮院主簿臣楊某奏謹按周禮宰夫掌治朝之法以正王及三公六卿大夫羣吏之位王視治朝則太宰贊聽治又按禮記曰視朝於內朝臣辨色始入內朝及路寢門之外朝羣臣治事王者日於此以聽視之故亦謂之治朝也唐六典曰凡京師文武職事九品以上聽每朔望朝參五品以上及供奉官員外郎監察御史太常博士每日參謂之常參官斯皆文武之有職事趨於朝天子御宣政或御紫宸以視朝聽治蓋沿周制也其無聽職事則無常參班次故㑹要所載如本官不是常參官并憲官是攝者惟聽於御史班中辭見乃知辭見之日即入朝自餘不入朝矣今乘輿常日御紫宸或御埀拱見內朝之臣聽天下之治遵用周唐故事無不協於典禮而其文德常朝官考之載籍似未為得於周則非公卿大夫羣吏治事者之比於唐則異京師文武職事之官竊聞其間多是待次之人久在旅瑣日趨闕廷勞乏可惻加之纍歲以來常候宰臣奏事退赴押班或遇辰正牌上方得放班近者伏聞德音令今後御史臺候垂拱殿坐即一面放班中外相傳莫不稱頌嚮非陛下至仁盛德矜察微隱何以及此以臣愚見其文德殿常朝官在京未有職事於禮可免常參伏乞朝廷特與放罷或祗令赴朔望起居其賀謝辭見及京司百官五日一赴起居者自依定制如此則於周唐舊儀兩以為得臣雖賤愚備員禮局有所聞見不敢不言謹具狀奏聞伏候勑㫖上辛祈穀議謹按月令孟春之月是月也天子乃以元日祈穀於上帝注謂以上辛郊祭天也公羊曰郊用正月上辛注三王之郊一用夏正言正月者春秋之制也正月歲首上辛猶始新皆取其首先之意又穀梁曰我以十二月下辛卜正月上辛又左氏曰啓蟄而郊注啓蟄夏正建寅之月也陸淳曰啓蟄為建寅之月百蟄驚出爾略舉時候非必取厯驚蟄之節也此蓋用正月上旬辛日以祈穀即不繫立春節氣之前後假令十二月中旬下旬立春因擇辛而祈穀則是用中辛下辛即非元日之義本部今參詳合依天禧元年勑㫖上辛不拘立春先後所有王少卿所議及天禧以來太史所定上辛之日委得允當太常所議立春後祈穀難以依從奏請太廟殿上鐘磬狀右臣伏聞聲音之道與政通堂上之樂所以象宗廟朝廷之治堂下之樂所以象萬物之治堂上堂下用樂雖殊八音克諧各不可闕其實一也今太廟之樂堂下具八音萬物之治可謂周矣堂上之樂則闕鐘磬在宗廟朝廷之治八音有所未備焉臣職在禮樂不敢不言謹按禮曰鐘聲鏗鏗以立號詩曰既和且平依我磬聲是知樂之號令自鐘聲而立樂之和平依乎磬聲則鐘磬安可闕哉臣昨䝉睿㫖提轄修製朝㑹殿上玉磬曽於去年具奏乞依虞書戛擊鳴球之義候玉磬成日先用之於太廟殿上以稱陛下稽古奉先之志尋䝉付外未奉朝㫖施行今雖玉磬未成伏遇春陽發生之時太廟孟享之日欲乞出自聖斷依古復用殿上鐘磬所貴發揚至音號令衆樂以格祖考以致和平上自朝廷下及萬物咸被福祐臣某不勝大願謹具狀奏聞伏候勑㫖元豐八年正月二十五日堂上鐘磬議一准中書劄子節文詳定郊廟禮文所詳定伏請每遇親祠宗廟歌者在堂更不兼設鐘磬宫架在庭更不兼設琴瑟匏竹更不置之於牀其郊壇上下之樂亦乞依此正之有司攝事准此謹按虞書曰戛擊鳴球搏拊琴瑟以詠此有虞堂上之樂也下管鼗鼓合止柷敔笙鏞以間簫韶九成擊石拊石此有虞堂下之樂也正義曰球為玉磬商頌云依我磬聲亦玉磬也大射禮鐘磬在庭今鳴球於廟堂之上者按郊特牲云歌者在上貴人聲也左傳曰歌鐘二肆則堂上有鐘明磬亦在堂上故漢魏以來登歌皆有鐘磬燕禮無鐘磬者諸侯樂不備也是知堂上象朝廷之治堂下象萬物之治堂上堂下八音各備而互見之不可闕也又按禮曰升歌清廟詩序清廟祀文王此有周堂上之歌也大司樂路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣此有周廟中降神之樂也降神之樂既有獻以琴瑟則宫架內琴瑟不可去矣所有祀郊及有司攝事伏乞壇殿之上依舊設鐘磬其宫架下降神之樂亦乞依舊設琴瑟其匏竹不置於牀即乞依禮文所奏請上言大樂七事一曰歌不永言聲不依永律不和聲謹按虞書曰詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和蓋歌以永詩之言五聲以依歌之詠陽律陰吕以和其聲金石絲竹匏土革木八音克諧無相奪倫然後神人以和也若夫歌不永言聲不依永律不和聲八音不諧而更相奪則神人安得和哉且金聲舂容失之則重石聲溫潤失之則輕土聲函胡失之則下竹聲清越失之則高絲聲纎微失之則細革聲隆大失之則洪匏聲叢聚失之則長木聲無餘失之則短惟人禀中和之氣而有中和之聲足以權量八音使無重輕高下洪細長短之失故古者升歌貴人聲八音律吕皆以人聲歌為度以一聲歌一言言雖永不可以逾其聲如大善曲肅肅藝祖一句以仲南黃仲四聲歌之聲律最為和協今夫歌者或詠一言而濫及數律如正安曲至神感神夷黃一字兼四聲或章句已闋而樂聲未終如正安曲已終尚有黃無夷夾大五聲之類兹所謂歌不永言也伏請節裁煩聲以一聲歌一言遵用永言之法且詩言人志詠以為歌五聲隨歌故曰依永律吕協奏故曰和聲先儒云依人音而制樂託樂器以寫音樂本效人非人效樂此之謂也今祭祀樂章並隨月律聲不依詠以詠依聲律不和聲以聲和律非古制也伏請詳定使樂以歌為本律必和聲也二曰八音不諧鐘磬簫闕四清聲事謹按虞書曰簫韶九成鳯凰來儀蓋虞樂之成以簫為主也商頌曰既和且平依我磬聲蓋商樂和平以磬為依也周官鐘師掌金奏凡樂事以鐘鼓奏九夏蓋周樂合奏以金為首也是鐘磬簫者衆樂之所宗為聖帝明王之所貴數十有六其所由來尚矣漢得古磬十六於犍為郡鄭氏注周禮編鐘編磬及大周正樂三禮圖編鐘編磬簫並以十六為數示天子之樂用八鐘磬簫倍之以為十六矣且十二者律之本聲也四者律之應聲也本聲重濁應聲輕清本聲為君父應聲為臣子故其四聲或曰清聲又曰子聲也自景祐中李照議樂以來鐘磬簫始不用四聲是有本而無應有倡而無和者四十餘年矣八音何從而諧耶今巢笙其管皆十有九以十二管發律吕之本聲以七管為律吕之應聲用之已久而聲至和協伏請參考古制依巢笙例用編鐘編磬簫之四子聲以諧八音三曰金石奪倫事謹按大司樂文之以五聲播之以八音八音雖異其所以應律則一也故樂奏一聲諸器皆以其聲應也既不可以不及又不可以有餘八音克諧無相奪倫此之謂也今大樂之作琴瑟塤篪笛簫笙管筝筑奏一聲則鎛鐘特磬編鐘編磬連擊三聲戾於衆樂中聲最煩數而掩壓衆器求其所謂無相奪倫不亦難哉伏請詳定大樂其鎛鐘特磬編鐘編磬並依衆器節奏不可連擊三聲所貴八音無相奪倫四曰舞不象成謹按樂記曰夫樂象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也又曰武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子是大武之舞象周德之成矣國朝以謙德受禪郊廟之樂先奏文舞次奏武舞其於武舞也容節六變一變象六師初舉所向宜北矣二變象上黨克平所向宜北矣三變象維揚底定所向宜東南矣四變象荆湖來歸所向宜南矣五變象卭蜀納欵所向宜西矣六變象兵還振旅所向宜北而南矣今夫舞者非止發揚蹈厲進退俯仰不稱成功盛德差失其所向而又文舞容節殊無法度故曰舞不象成也伏乞考樂記象成之文詳定二舞容節及改正所向以稱成功盛德五曰樂失節奏謹按孔子語魯太師樂其可知也始作翕如也從之純如也皎如也繹如也以成始作翕如也始作翕然如衆羽之合從之純純如也節奏明白皎如也繹如其緒之不窮也夫然後成今大樂之作聲不齊一節奏混殽往來無叙曷聞所謂翕如純如皎如繹如者乎伏請稽考孔子之言詳定大樂節奏六曰祭祀享無分樂之序謹按大司樂乃分樂而序之以祭以享以祀乃奏黃鐘歌大吕舞雲門以祀天神乃奏太蔟歌應鐘舞咸池以祭地示乃奏姑洗歌南吕舞大磬以祀四望乃奏㽔賓歌函鐘舞大夏以祭山川乃奏夷則歌小吕舞大濩以享先妣乃奏無射歌夾鐘舞大武以享先祖夫金石衆作之謂奏詠以人聲之謂歌陽律必奏陰吕必歌陰陽之合也順陰陽之合所以交神明致精意也今冬至祀天不歌大吕夏至祭地不歌太蔟春享祖廟不奏無射秋享后廟不歌小吕既不能奏律歌吕順陰陽之合以格上神而又無專祀四望山川用樂之制則何以贊導宣發陰陽之氣而生成萬物哉故曰祭祀享無分樂之序也伏請依周禮分樂之序以奉祠事七曰鄭聲亂雅謹按孔子曰惡紫之奪朱惡鄭聲之亂雅樂然朱紫有色而易别雅鄭無象而難知聖人懼其難知也故定律吕中正之音以示萬世揚雄曰中正則雅多哇則鄭又曰黃鐘以生之中正以平之確乎鄭衛不能入也今雅樂古器非不存也太常律吕非不備也而學士大夫置而不講考擊奏作委之賤工如之何不使雅鄭之雜耶伏請審調太常鐘琯依典禮用十二律還宫均法令上下曉知十二律音則鄭聲無由亂於雅也今著大樂十二均圖一卷備載律吕宫調又各取本宫樂章一首附於篇以圖考聲則雅鄭昭然别矣右元豐二年八月一日上言二日宣取大樂十二均圖并序上進至三年八月十五日中書門下進呈奉聖㫖送議樂劉几等據几等奏若依楊傑所請其大樂律吕委得和諧伏候勑㫖九月十五日奉聖㫖依奏申明誣告官員罪犯具位臣楊本司近准淮南轉運司牒勘斷潤州百姓翟忠盛因分擘伯父翟日榮家財纍經官司依公勘證其人輒更罔昧朝廷進狀指論官司干謗臺省行遣不當致煩朝㫖下淮南路勘鞫委不合再分伯父財産又檢㑹昨有秀州華亭縣户陸華經省部誣告本縣知縣承議郎陶鎔取受捕魚人等銀錢僅千餘貫又有常州裴宗元止因爭理姓産於進狀誣毁本路轉運副使孫昌齡曽有干涉行遣不公其妄陳詞之人各巳引用赦恩原罪竊謂此風不宜滋長須至申請者右臣勘㑹人户理訴公事已經州縣依公定勘結絶其間却有頑狡之人隱匿情犯别經監司臺省或詣朝廷陳狀事涉誣謗或稱所勘官員受贓請託行遣不公欲得信憑受理自知虛妄即多近大禮年分或於大寒盛暑之際指望在京非次恩宥欲其幸免誣告之罪前後興起大獄禁繫良民不少兼又被論之官未顯虛實若稍涉嫌疑須當權移差遣或申奏朝廷令先罷職事伺候辨對動經歲月方得了當其被告官員若果如所論即係入已贓遇赦不該原免得罪非輕或雖無贓賄稍涉用情亦當終身廢黜洎至勘證委無贓私其誣告之人應得反坐之罪又却該赦全原遂致豪猾姦惡之人教唆鼓扇自謂得計官司易以搖動公然誣告無所畏憚至有亷吏遭此謗毁逺近傳聞難以自明雖不獲罪而陰陷清議曖昧不申有傷風教臣今起請欲乞今後應有詞訟指論當職官員取受錢物受人請囑行遣不公等事約法合得免官除名不原赦之罪者如勘證得委是誣告即下狀并借詞之人斷本罪外亦乞申取朝廷指揮量情輕重編管刺配或遇赦宥亦乞特不以赦原所貴狡獪頑惡之徒稍有畏憚不敢輒以虛詐干臺省誣罔監司州縣承勘官員謹録奏聞伏乞朝廷特賜詳酌指揮下刑部立法施行無為集卷十五

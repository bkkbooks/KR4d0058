front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0058_WYG_007-1a, image: WYG1099/WYG1099-0711a.png}
body:
  text: 無為集卷七宋楊傑撰絶句廬山五笑并序無為子願遊廬山者二十年矣治平三年冬赴官江西舟過匯澤乃得侍親攜幼摉竒尋勝以償素望一宿山間而去馬上不覺自笑顧一已無足笑故廣之而成廬山五笑云逺師我笑東林寺孤高逺法師種蓮招社客平地鑿成池陶淵明我笑陶彭澤聞鐘暗皺眉籃輿急回去巳是出山遲陸先生我笑陸簡寂修真脫世埃九霄一飛去重入舊山來開先招老我笑開先老家風雙劍高雲間本無事拭目看金毛無為子我笑無為子逰山學古人匡廬不能住騎馬入紅塵贊皇公祠夢到瀛洲夜覺來江上秋一身投絶域千古弔窮愁魏徴君草堂召伯甘棠國東郊處士家百年三世隱泉石當生涯登南樓此樓此景他州無山川形勢吞三吳唯慿詩老寫竒勝縱有畫筆難工夫此樓此景他州無欄干倚遍還躊躇主人有酒且共醉驪歌不用催行車此樓此景他州無天髙水濶連平蕪緑楊深處杏花發日暖數聲山鷓鴣懷黃梅三閣并序黃梅縣牆西有池多魚舊政或捕為樂自余為令戒勿取其後乃為放生池池上三閣曰釣閣吟閣醉閣公暇與客登之頗有佳趣因葛令赴官作三章寫其懷云釣閣屏去竿頭餌非唯用直鈎我來魚不避魚信我無求吟閣二十年前令曾來閣上吟如今頭已白詩有壯時心醉閣江邊醉長官昔慕陶彭澤未賦歸去來於今有慚色題陳令壁地勝江山國風清令尹家酒䦨寒食夜月上海棠花清軒清軒直下壓秦淮淮是秦皇厭勝開干古興亡無問處好風唯共月明來水月軒湛碧一泓泉中涵千古月不比天上輪三五有盈缺徐賢亭偶成湖外青山在湖邉人不歸古今無問處幽鳥下漁磯遙碧亭幽鳥無心去又還迢迢湖水出東關暮雲留戀不飛動添得一重山外山斗野亭八月風髙浪渺瀰仙公醉倚海槎枝夜深曽傍亭邊過亭上主人知不知送陳令歸無為楚水漾輕碧楚花飛亂紅故人故鄉去半雨半晴中劉彥輔乞侍飬變化未隨雷煥劍晨昏願服老萊衣山堂大飲不敢醉應恐倚門人望歸别安廷老山色淺深煙靄裏客情去住别離中臨川聚㑹應不久明日扁舟乘便風和黃倅别諸公二首豫溪春雨江湖平蒼壁洲邉春草生吏民出郭自歸去草間流水隨君行垂楊隂裏繫行舟隔岸數聲黃栗留異日相逢定何處莫辭春蟻一杯浮釣磯懷古十章并序治平三年冬十月一日艤舟江上與二三子登古釣磯慨然長望有客問曰古之善釣者可得聞歟曰吕望任公子詹何魯人莊周琴髙陵陽子明嚴光左慈劉遺民皆古之善釣者也呂望釣魚磻溪有志於天下也任公子釣於會稽以大取其大也詹何釣於南國以寡獲其多也魯人釣於洙泗華過其實也莊周釣於濮靜而保真自適也琴髙釣於涇仙而隱也子明釣於旋溪愛物而有獲也嚴光釣於東陽退而自適也左慈釣於魏樂其術也遺民釣於江東知時也十子之釣或取或捨或進或退所適不同同歸於釣唯至神為能以不同同之以不釣釣之使各任其所適焉夫有志於天下者可與共治以大取大者可與議逺以寡獲多者可與議要華過其實者可與救質保真自適者可與救貪知時者可與議變愛物者可與議取仙者術者可與逰乎方外故物物各遂其性人人各盡其材來者納而勿拒往者縱而勿追得者吾得之失者我亦得之然後出入六合逰詠乎太和之域非天下之至神其孰能與於此哉乘風將行乃賦釣磯懷古十章云吕望舉世無人用直鈎直鈎到底是良謀孟津再擲磻溪餌八百諸侯盡愛周任公子機深誰及任公子浙水蒼梧飽巨鱗鯢鮒不吞鈎上犗一年笑殺海邊人詹何五年南國釣煙波妙手從來所得多魚引盈車竿不撓幾人施舍似詹何魯人好釣無如魯國人暗投香桂餌遊鱗誰知淺水魚貪食不待金鈎翡翠綸莊周謾投香餌試纎鱗楚使徒來濮水濱莫訝持竿不相顧顧君還是上鈎人琴髙不釣浮名不釣魚一綸鈎線卷還舒九霄控鯉無人識誰道纎鱗是膾餘陵陽子明旋溪不殺真龍子學道三年躡太虛今古報恩人亦有不知誰有腹中書左慈香餌輕投一席間鱸魚潑潑躍銅盤曹公不悟神仙術徒整金鈎把釣竿嚴光狂奴肯顧安車聘祗愛東陽七里灘誰道世間人不識客星光射紫微寒劉遺民雨笠煙蓑細草巾持竿誰識白蓮人當時若得文王獵涇水還應似渭濱寶林院五松葛洪井上兩三株不與孤秦作大夫借問東山歲寒木得毋羞見水西無太白桃花潭李白詩云太白登舟方欲行忽聞江上踏歌聲桃花潭水深千丈未若汪倫送我情桃花潭似武陵溪太白仙舟去欲迷岸上踏歌人不見年年空有鷓鴣啼東峯白雲院僧愛白雲溪上飛白雲飛處敞禪扉莫言便是無心物憶著故山依舊歸采石四詠溫嶠半夜燃犀采石江江神無處避餘光未應赤幘能為害窺見淵魚已不祥袁宏袁郎風格抗浮雲詠史髙吟世未聞乘月泛江今古有不知誰是謝將軍李白一别蓬宫不計年錦袍吟醉釣魚船鑑湖賀老天機淺輕向人間號謫仙樊若氷兵到金陵舉國降若冰謀䇿謂無雙由來天意歸真主何必舟梁始渡江濓溪山為羌仙傳舊姓溪因亷士得新名願持一勺去南海直使貪泉千古清留題城西水磨客來亭上脫春衫馬浴寒泉洗轡銜怪得主人留再住水聲林影似江南贈范魯仲人急生前計子圖身後名重來天地逺誰為作權衡賞梅呈仲元十年不見錦江梅今日清香入酒杯太守為施紅步障郡園驚怪夀陽來瑞香孤根移自紫霄峰只鬭清香不鬭紅憶得婆娑一株桂歐家曽見月屏風文忠公家有月石屏風內有一桂與此相類訪吳尉不遇人愛紅塵我愛山尋山重叩白雲間子真避客逰都市月上梧桐未肯還隱靜十八松廬山社友皆逃晉秦府功臣不仕隋今日明堂求巨棟好教天下匠師知碧霄泉魚巖深䕃薜蘿金鬛弄寒波莫愛江湖好江湖罾網多逰白雲山醉題僧壁買得青山不用錢金沙門外草綿綿黃梅老令醉欲倒擬借白雲今夜眠野寺澤國春風老雜花間芳草門前車馬稀竹葉無人掃山房枕上作十里溪源尋未見忽逢茅屋白雲堆竹牀紙帳睡正穩無奈野猿驚覺來天台思古逰人行盡天台路山家杳杳知何處唯有山前一派溪落花依舊流春暮還慶師扇贈我無心著還師理亦然秋風歸舊谷明月上青天無為集卷七

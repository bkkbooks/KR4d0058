body:
  text: 無為集巻三宋楊傑撰古詩幽谷吟上歐陽内翰滁山插空望不足行信馬蹄入幽谷生平未慣塵外遊先酌寒溪洗塵目自疑身是武陵客誤逐桃花迷水曲欲窮本始問歲月亭上雄文鑿青玉意高語險測難到拂散白雲再三讀乃知造作自混沌山神固䕶寶藏匵路歧未許車馬通白日蒼煙走麋鹿一從紫府仙人來指出洞天三十六膏澤疏開不死泉棟梁養成歲寒木靈苗異草無根株搖蕩清香過林麓峯巒圍匝别是天天在山中成大畜先生之心此其象往行前言深藴蓄議論吐為仁義辭文章散作生靈福黙笑真工功未醇餖飣春風㺯紅緑耼云谷得一以盈以一能應無窮聲千古萬古聲不盡先生得之為聲名公之聲名公之心日益遠大日益深愚儒耳目所不及奮筆空成幽谷吟辟雍硯上胡先生媧皇鍛鍊補天石天完餘石人間擲擲向淮山山下溪千古萬古無人識晝出白雲籠九州夜吐長虹籠太極去年臘月谿水枯色奪江頭數峯碧野夫採得琢為硯一畫中規外方直方直端平象地形形壅水流流若璧擬法辟雍天子學不比頖宫一隅塞幸遇先生掌辟雍持以獻誠安敢惜欲伐東山五大夫受爵非材鍊為墨欲乞湘妃血淚竿刮削除斑供簡䇿欲就退之借毛穎同與先生記心畫先生記之何所先探賾聖賢詮六籍四時七政有未平願述陰陽修律厯要荒流蔡有未賓願攄雄略操軍檄辟雍之水流不窮先生之材無不通願攜此硯飛九穹圓潤化筆扶天工屏石謠贈郭功父屏石屏石何嶃巗云初得自江之南沙埋土蝕㡬千載無人辨别嗟沈淹浄空居士物鑒精獲之不貴黃金兼清泉洗滌露真璞野雲凝結堆濃藍巫峽山前暮雨霽參差十二挑峯尖比千骨朽心不朽通竅至今存四三蜂房蟻垤豈足數或疎或密争嶔嵌銅臺古研置其下一片皴碧沈寒潭唐朝牛公嗜怪石取之不已其亦貪争如夫君一勝百得此自足無傷亷我嘗乘醉到君家臨風叩以蒼玉簮其聲淸越合律吕簨簴可與大樂參何當琢磨中勾股列為編磬歌雲咸問君考擊薦郊廟孰若藏在青山庵潛山行昔年㑹稽探禹書探得六甲開山圖圖載潛南天柱山上侵霄漢下淵泉真人祕語世不傳但見絶頂䝉雲煙漢武射蛟浮九江舳艫千里來樅陽築壇祈仙瞻杳茫茂陵檜柏空青蒼石牛一卧叱不起白鹿還歸深洞裏二月靈鶴有時來洞口桃花泛流水歌白雪二章歌白雪雪滿龍沙暮冬月萬里征人歸未歸一聲曉角雲中咽歌白雪雪壓樵夫樵擔折行到都門門欲開十二玉樓歌未徹勿去草勿去草草無惡若比世俗俗浮薄君不見長安公卿家公卿盛時客如麻公卿去後門無車唯有芳草年年加又不見千里萬里江湖濵觸目凄凄無故人惟有芳草隨車輪一日還舊居門前草先除草於主人實無負主人扵草宜何如草無惡若比世俗俗浮薄古行路古行路古行路今人欲追古人去古人去逺何可追後人視今如古時君不見去年春風去已乆今年春風亦依舊和酬子瞻内翰贈行長篇雲濤擁開滄海門鼓鼙萬叠鳴江村仙翁引我峯頂望耳目震駭難窮源黄金鑄鯨為酒樽桂漿透徹氷雪盆吴歌椘舞屏不用夾道青玉排雲根經綸事業重家世昔聞父子今季昆九丹煉就鼎竈温刀圭足以齊乾坤我行欲别湖山去為我索筆書長言照乗不假明月珠自有光焰生軺軒和章學士祈晴昭亭山洪範八政一曰食民非稼穡胡為生江南風俗重圩垾嵗遇豐稔倉箱盈嘉祐六年宛陵郡積月霖雨妨秋成昔之鬱鬱若雲秀今也汎汎猶青萍豈惟百姓失所望將恐祭祀無粢盛集仙到郡為憫惻齋心命駕祈昭亭昭亭山下欲回轍太陽赫赫輝雙旌老農乗時得刈穫清風和氣謳歌聲我知夫子禱巳乆由有盛徳通神明願公移此福天下隂陽調燮歸和羮五雲叟琴閣朝望五雲山暮望五雲山望之欲去未得去抱琴登閣聊怡顔琴聲噴潺湲意在山之泉琴聲險欲絶意在山之巔五雲之山不須到勸君但作五雲操凌歊臺大明七年暮冬月宋武南廵立雙闕鑾輿先幸凌歊臺雲中簫鼔轟春雷六龍一去杳無迹山花野鳥空相憶翠羽鳴鞭來不來景陵芳草年年碧景雲軒南城城外山崔嵬景雲軒上無塵埃雙溪水落逐年急白髮僧歸何日来畫屏滿目萬瓦合㡬人到此心如灰恭軒春雷驚起蒼龍角春風擺開紫雲籜掃斷紅塵不得来翠羽旌幢擁髙閣髙堂老人年八十朱衣省郎侍旁立追懐手植先大夫栽培灌溉何勤劬濃隂潛蔽芝蘭徑美實飽供鸞鳯雛幽軒得名名曰恭見此還與桑梓同豈惟雪霜不可改年年髙節搖清風留春亭古今春過知多少人不留春頭白早君欲留春心可知為君更賦留春詩留春莫只留花住花老春風亦隨去孰若芝蘭香不歇亭下長如二三月滄浪亭滄浪之歌因屈平子美為立滄浪亭亭中學士逐日醉澤畔大夫千古醒醉醒今古彼自異蘇詩不愧離騷經送陳資道有客抱荆璞不琢貴其質兢兢三十年常恐有墜失所欲價百倍今也十之一勿患知者難光彩已四出古鑑謠鐡鑑埋重泉知經㡬寒暑山翁築春田得之南澗滸磨刮追光輝雲巻秋蟾吐斂袵正面視歴落露心府壞垣試一照隂靈吼風雨我欲匣此鑑西上獻人主不願鑑其鑑願君鑑於古桀紂不鑑古基業傾湯禹幽厲不鑑古綱紀頽文武吾皇寳其鑑清風塞寰宇豫章行送周裕君不見南浦亭前草送人千里道一畨膏雨一畨青不顧王孫江外老又不見豐城劒埋塵土間㡬年秋水澄波瀾夜深直氣射牛斗變化風雷頭角寒丈夫窮通有時有滿腹詩書滿樽酒行行三月到揚州故人莫笑麻衣舊和穆父待制蓬莱觀雪戊辰嵗厯長兩春一逢臘上瑞兆豐年同雲彌六合初如天馬来奔入銀河蹋梁苑客後至郢樓曲難答錦繡方還里罇罍喜開閤光照孫康書寒恤袁安榻但愛川陸平不問瑶珉雜扁舟欲泛剡凛氣若浮漯龍圖屢烹試風腋頓爽颯明月交清輝絳籠不燃蠟贈朱伯原張籍心不盲何為盲扵目伯原道不病今也病在足及第二十年未識太倉粟樂圃徳義重可敵萬鍾禄世味覺幻夢老把華嚴讀九㑹發淵微賛文煥珠玉洞庭秋月澄吳門春草緑香海泛虚舟不懾魚龍觸凌雲行淮國耕釣夫素嗜山川樂補吏来盱江潛解藍綬縛獨上凌雲亭青梯入寥廓萬象富觀覽面面峻巖壑天風襲衣襟綵霞半空落仙家雞犬鳴驚起巢松鶴勝逰㝡後時萍梗念飄泊回首顧人間紅塵滿城郭無為集卷三

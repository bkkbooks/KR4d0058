body:
  text: 無為集别集類二宋提要臣等謹案無為集十五巻宋楊傑撰傑字次公無為軍人因自號無為子嘉祐四年進士元豐中歴官禮部員外郎出知潤州除兩江提㸃刑獄卒于官原序稱侍講楊先生葢其帶職也傑及與歐陽修王安石蘇軾遊故其詩雖興象未深而亦頗有規格其率易者近白居易其學為奇崛如送李辟疆之類者或偶近盧仝大致則仍元祐體也又及與胡瑗遊故所學亦頗有根柢官太常時議典禮因革多所討論集中如補正三禮圖皇族服制圖諸序以及禘祫明堂樂律諸奏皆有闗于典制但其文才地稍弱邊幅微狹耳集凡賦二卷詩五卷文八巻紹興癸亥知無為軍趙士㣓所編士㣓序云删除蕪纇取有補于教化者若釋道二家詩文則見諸别集今别集不傳故張敦頤六朝事蹟載其雨花臺詩一首王象之輿地紀勝載其浄居寺詩一首潛説友咸淳臨安志載其西湖參寥山房詩一首鐵網珊瑚載其佛日山别長老弼公詩一首凡為僧作者今皆不見于集中也然第五卷中有書寶山寺壁一首第七卷中有題寶樹院五松一首東峰白雲院一首野寺一首第十卷中有圓同菴銘一首圓寂菴銘一首未免自亂其例乂如銘五首入襍文贊亦襍文乃列詩中詩以古體律體分編而和謝判官宴南樓一首本拗體七言律詩而誤入古詩編次尤為無緒至于魏詔君贊詔字葢避仁宗嫌名而次巻仍稱魏徵君草堂校讐亦未盡善惟傑集自南渡以後湮沒不傳士㣓積兩嵗之力搜求編次使得復傳至今其表章之功固亦不可盡沒耳乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀無為集原序國家以文教作成海内近二百年主上紹開中興息馬論道者一紀於兹比詔有司修建太學盖以儒術粉飾治具漸磨士類未始須臾置也無為在淮右為小壘而多名士侍講楊先生名傑字次公道號無為子實一時文人公自妙齡擢巍科以雄文妙賦醇徳懿行得名於時中間立朝議禮樂因革人尤多之晚年甞奉使過泰山觀日出於絶頂之上重九日賦詩舉酒於華山蓮花之峯繼被詔從髙麗僧統義天逰前輩以謂皆以王事而得方外之樂故於瞿曇尤造理窟當時如大丞相王公内翰蘇公悉印可之年七十而終生平所著文集湮沒未傳於世吁可惜也嵗在重光作噩之冬士㣓誤恩假守是邦服膺侍講公之名舊矣視事之初首詢公文於搢紳間嵗餘搜獲不一公遣詞典麗立意奥妙因刪除其蕪纇取其有補於教化者編次成集將以為學者標準上佐吾君偃武修文之意不其偉歟其詩賦碑記雜文表啓共分為一十五巻若釋道二家詩文則見諸别集云紹興癸亥歲夏四月左朝請大夫知無為軍兼管内勸農營田事趙士㣓謹序

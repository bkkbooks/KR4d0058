body:
  text: 無為集卷二宋楊傑撰律賦五六天地之中合賦竒偶相合兹得中正朴散太極形分兩儀天五得其中也地六從而合之數各有常法乾健而坤順位皆處正併陰偶於陽竒聖人述易幾微窮神高厚以謂地自二以至十天始一而終九數相協而運行義故得而悠久凡十有一畢乎道其道皆然惟五與六合而中以中為偶大抵一闢一闔五柔五剛八與三而契會四暨九以更相亦皆助生成於品彚廣變化於無疆胡為數之五六獨合體於中央蓋夫共播日辰日有甲而辰有子協為聲律聲上宫而律上黃以中中其不中以正正其不正上全真宰之化下遂羣靈之命氣降為味陶然覆載之間民受而生賦以中和之性是所謂象有滋滋有數窮則變變則通名數本堪輿之用交通為造化之功設在衆甫合夫大中二氣始分類本從於三兩五位相得獨無黨於初終後世商建五官周分六職經有五典士敦六德豈非取法於高卑然後鑒人之失得觀而作服可為色以為章敘以成疇故曰福而曰極定數若此至神在兹既可推以造厯又可準以揲蓍亦猶三五異位而同功孔子述卦爻之義一六共宗而在北揚雄明首贊之辭則知地數雜而不純天數純而不雜物理深藴歲功周匝就五十有五之中五六謂之中合導河積石賦導河施功始於積石堯末遇水禹先導河俾乂中邦之害必由積石之阿疏經瀆之橫流圖成茂烈自金城之巨鎮下決餘波昔者世病懷襄人思降宅天命神聖力平川澤悼父績之湮淪窮水源而疏闢且謂為民之患患莫大於洪河而治水之功功宜先於積石北越降水東踰大伾或穿地以湍悍或鑿山之嶮巇流不自注功由此施昔也出圖天嘗授於羲氏兹焉興復山必始於龍支況夫江已決於岷山洛巳疏於熊耳矧此至大尤當謀始故我因水徑道以山綱紀成其功於十三年歷其地之三千里流未入於北海思是用勞勢必就於西平勳由此起或謂禹績雖大河源未窮殊不知出昆崘以湍激至蒲昌而會同皆在塞外或潛地中不為吾俗之所患故自此山而起功靈派至長蔥嶺于闐分為二聖人經始西傾朱圉在其東宜其海宇砥平勳庸日積治雍州以云備入冀都而建白播以過於大陸遇此洪波浮而至于龍門告其成績有生乃粒無患其魚大功可謂至矣後世何以加於亦猶引渭會涇由鳥鼠而基兆疏淮入海自桐柏以權輿惜哉聖去邈遼民煩疏導既禹迹以湮塞徒漢歌之嗟悼胡不訪名儒而修水官講究夏書之奧能賦可以為大夫賦因物能賦可為大夫鄰國交好古人重詩苟賢者之能賦故大夫之可為感物造端致二邦之協睦量材録德宜再命以優推嘗聞侯以賢封土由君胙鄰邦不可以不睦臣職不宜乎不具將與謀事必求能賦且詩有六義能宣列國之誠而智效一官當預大夫之數蓋夫善比而興能針以懲適四方則命無所辱善一言則邦從以興既達古之風雅可為君之股肱誦三百之遺篇足彰才智宜五十而後爵以寵賢能及其受命出疆從君與會講好以修睦興利而除害我則文寄其心聲聞於外揚四始以深諭為二邦之所賴是以班固之言圖事諭志居先盧愷之議審官語詩為大則知道佐列辟尊為大夫祿不可過爵不可踰苟弗善其詩者豈足謂之賢乎必也鴻鴈應機可任歸生之職羔裘善誦是為子産之徒況夫主意淵深國幾叢脞託章什以後達非賢才而安可詩人之詩諷而誦義巳精窮祿士之祿倍而兼材當克荷故聖人著育才之法正取士之因以謂官欲入者學於古夏所誦者弦於春就宵雅以肄三始從師氏及君子之能九進任陪臣後世詩道陵夷聖言湮鬱義失風賦文煩黼黻學之不足以事君詠之不能乎託物然而位或至於公卿得無愧於簮紱深衣可以為文武賦服深衣者可為文武先王蓋有法服古者謂之深衣惟聖賢之被體為文武以圖徽中規矩而應權衡飾身以禮可擯相而治軍旅助德而威嘗聞服不妄成義有所主或專用於朝聘或止臨於仕伍獨此深衣創從先古約之以法毋被土而毋見膚服也在人可以文而可為武自天子之貴及庶人之卑所純則異隨時以為實善衣之亞者俟兼材而副之應六二爻得正義直方之節行三千禮盡干戈揖讓之儀其布十有五升其裳十有二幅用之燕饗燕饗協用之師田師田肅念養老之虞氏昔嘗在躬非學道之仲尼孰能稱服大抵衮衣非不華也不得施於武黼裘非不威也不足用於文兼爾適用此其不羣既可次於六服又是率於三軍設五法者聖人昭然有制持二柄於天下衣以成勳則知賔主昭其信誠師旅奮其剛果將者尚其右相者處其左則必服有制度然後人無懈惰兼髙下短長之法義各有歸參會同征伐之間施無不可故曰足以浣濯服而邃深可秉威而章化能安志以平心亦猶委貌者田獵之冠燕臣亦用鷩冕為饗射之服祭事其任後之人文不足以經邦武不足以衛社盛服雖被成能蓋寡噫得無愧於深衣不賢而識其小者繼别為宗賦君之别子繼者為宗諸侯之庶謂之别别子之適謂之宗欲正世以相繼惡羣心之異從惟君弟之初生法當似續致族人之仰事禮盡寅恭古者列侯先正其裔凡立厥次乃奠而世則斯子也君夫人以為母必有弟也卿大夫以同制宰乎爾族為始祖以優崇適曰大宗庶後昆之承繼嗣既云立禮無不司如親疏之升降昭穆之尊卑吉凶之容節昏冠之威儀族所為者吾皆主之職在成家紹一宗之本始代相纂服豈百世以遷移亦有自異國以肇臻與是邦而同列既處其土因謂之别亦自命其來裔嫡嫡相仍得兼綜於小宗承承不絶大抵綱之舉則網不得而亂表之正則影無從而欺欲家邑之咸乂捨宗子以何為豈不見魯國三桓立其長而統其下鄭人七族建其本而率其支是知别者别也父别異于侯氏宗者尊也已尊優於胄子以纂其德以紹其美考之書無作室之誚在乎易盡克家之理彼於國而食采肇啓封疆此以族而得民嗣承綱紀夫然則仰繼公子上尊國君正統得以全其貴同姓無以亂其羣且異夫三從事之以稱宗易於後世庶子賤而不為長載在前文孰若我在九族而貴之稱五宗之上者無忝父德克寧家社故曰繼其祖者傳代不遷重其統也藉田居少陽之地賦天子之藉居地少陽位各有法藉無妄為實聖人之耕者宜少陽以居之建王社於田中因時以享就春方於國外順氣之施蓋夫追養祖宗告虔天地酒齊以之薦粢盛以之備故凡建國之先必擇為田之次然而制度不同方隅相異在周人之盛世嘗處南郊至唐帝之昌期變居東位其意若曰地播生氣時從少陽土因而沃物得而昌此既興於王藉吾可實於神倉是故廣闢農疇用作躬耕之所仰參乾道式當歲起之方時或晨見農祥日躔天廟則必朝士謹司徒之戒王者納稷官之詔命載耜以勤勞率就田之壯少東作以禮自符虞帝之書壇置於郊何愧孔生之誚胡不居於北者惡其就嚴凝之地胡不居於西者惡其專肅殺之權就嚴凝則莫繁其稼專肅殺則徒事於田曷若我地乘於震氣順於天啓千畝於王畿壤稱其奧遵五行之木德位據其偏是所謂假力於人名田為藉因先聖而有建非後王之能易禮殊西漢賈生不必獻其言時在陶唐羲仲可以兼而宅夫然後天下之農不敢以怠諸侯之養不得而疏自我良疇之廣據兹盛德之初亦猶王所處之明堂國陽以立臣所興之小學宫左而居厥後政失紀綱君輕耒耜上既逐於晏逸下亦忘於耘耔宜國家舉盛典以興藉田繼有唐之天子無為集卷二

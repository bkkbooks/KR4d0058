body:
  text: 無為集巻十一宋楊傑撰表啓潤州到任謝皇帝表久官省寺無補朝廷乞守方州願伸微效拜伏新命得經歲以待期歸省故園實均恩於賜告慰見民吏恭布教條中謝伏念臣少起農耕長從科舉䇿名清世垂三十年備員太常連六七任在先帝一朝禮樂嘗玷討論遇陛下千載風雲屢更任使以至陪賔講道入部為郎既逃辱命之譏仍免瘝官之責遽形外請䝉賜中俞此蓋皇帝陛下洪覆無私靡遺一物大明繼照廣被萬方纉至治於唐虞不忘勤德保成功於文武克念宜人致此懦愚亦膺委寄臣敢不下求民瘼上體天心宣化承流冀仁恩之浹洽惟良共理思訓勑之丁寜誓罄涓埃仰酬造化潤州到任謝太皇太后表乞守方州初虞僣冒豈圖睿㫖曲賜允俞已見耆年仰宣聖澤中謝伏念臣生本寒士出逢盛時強起應書累嘗隨賦自忝一第歴奉四朝惟知直道以事君詎肯阿權而進已省寺承乏歲月屢遷犬馬之齒漸衰天地之恩未報固求補外奚止便私耻將空老於熈辰實願收功於晚景而况潤稱京鎮爲江左之名藩唐擇守臣摠浙西之諸郡禄豐地重材薄望輕退省無能拜榮增懼茲蓋伏遇太皇太后陛下母儀累聖子育羣倫其仁如天每聽卑而矜恤以慈為寶務從治以生成致此瑣材亦分優寄有民有社敢上負於蒼穹盡孝盡忠誓益堅於素節兩浙提刑謝皇帝表守符未久報政無聞叨被聖恩就移指使中謝竊以先王明罰期弼教以化成君子盡心必求生而㕘聽遣使諸路自我盛朝獄非無辜人浸餘澤以至完甲兵以禁其寇暴積倉廩以濟其困窮惠民為深領職尤重如臣蹇拙適用寡能拜命戰兢以榮為懼茲蓋伏遇皇帝陛下道周庶物徳被萬方堯舜好仁於變可封之俗成康善繼寖隆㡬措之風敢謂渥恩致加微品臣敢不詳其枉直約以重輕仰酬欽恤之誠敬奉丁寜之訓誓捐頂踵圖報乾坤兩浙提刑謝太皇太后表出守左符未逾朞月遽聞赴闕之命尋乞外邦致膺持節之華就移本部拜恩視事冒寵踰涯中謝竊以祖宗以來屢降欽哉之訓典刑所繫審知使者之難江湖尤重於三吳囹圄與聞於一路俾無寃濫責以澄清茲蓋伏遇太皇太后陛下坤順含光巽重申命媧天宻補鼇安立極之功漢網益寛魚泳吞舟之樂臣敢不敬遵中典上體至懷刑期無刑祈報大生之徳訟使無訟助成丕變之風謝修南朝正史及賜筆墨表代王相公叨被寵休伏深戰懼中謝臣聞堯舜盛徳書首載於典謨文武成功政備存於方冊信莫如史才難其人直筆所傳歴代攸責惟二聖之言動著百王之範模賢能進而任本朝廷禮樂興而度越今古賞有功而善者勸罰當罪而惡者懲區宇攸寜人物富庶將紀隆平之治用詔無窮必資該洽之才仰膺茂選豈宜寡陋獲玷討論荷給札之殊榮徒懷鉛而増悸禮部賀冬至上皇帝表伏以七日陽生氣肇萌於子位八龍樂奏音已恊於黄鍾君徳寖昌人心胥慶中賀恭惟皇帝陛下對時化育凝命穆清適當景至之辰擁集朋來之祐推䇿迎日履長用保於無疆理物承天行健永期於不息臣某等幸逢令序獲遇熈朝同傾百辟之心上獻萬年之壽禮部賀冬至上太皇太后表伏以御察璿璣二曜應乎合璧審觀玉律一陽動而飛灰雲物效祥鐘竽恊樂驩騰華夏福集邦家中賀伏惟太皇太后母儀三朝子育羣品佑神孫而隆慶扶寶運於無疆政必身先順布陰陽之教神潜德本黙參天地之心推周厯以開端望堯門而獻壽禮部謝春衣表伏蒙聖慈賜臣等春衣者竊以天道下濟常覆被於羣生春服既成首分頒於庶位中謝恭惟皇帝陛下順時布政愛物推誠寵賚所以勸功寒燠與之同體爰自造庭之士咸均在笥之華臣某等就列垂紳䝉恩賜帛無補經綸之業稱服其難退思機杼之勤飾身益愧誓堅大節仰報至仁禮部謝冬衣表萬乘御裘方戒祁寒之備羣臣受服幸無終歲之憂傴伏知榮曳婁增賁中謝恭惟皇帝陛下誕敷醲化廣庇含靈齊七政以觀方叙四時而成信凡有加綈之煥軫及外庭士均挾纊之温敢忘盛德臣等拜恩華粲省已愧兢誓極捐軀庶將報國天地至大曲全生育之功松栢後凋願固始終之節白溝謝御筵奏狀將命乘軺講隣懽而惟舊及疆授館䝉郊勞之至優豐腆肴觴溥霑皂𨽻荷惠慈之加厚在誠意以深銘新城謝撫問表候人在道方伸入境之儀使者傳言遽拜問行之惠中謝竊以肅將國命敦結鄰歡属寒律之載嚴荷温辭之曲諭仰懷恩眷第極感銘中京謝皮裼表候届祁寒恩均盛服恭承存撫滋集欽銘中謝竊以誕節修儀軺車將命善言曲諭已均挾纊之温厚意所加仍拜授衣之寵寘懷無斁叙感奚殫謝館宴奏狀弭節修途柅車華館重沐示慈之貺益銜將意之隆仰荷眷私第銘衷悃謝簽賜酒食奏狀征軒爰止旅次甫寕薦紆肴醳之霑仍厚饔飱之品永惟刻荷莫究敷陳謝王餼奏狀軺車將命夙致於鄰懽多物在庭特豐於賔餼仰祗恩禮深激悃悰謝射弓御筵奏狀息驂騑而就館夙被眷存講燕射以娛賔繼叨恩貺矧乏和容之善徒增拜賜之勤謝餞送御筵奏狀軺軒修好方成命以言還祖席優賔復寵行而埀眷感銘斯切敷叙奚殫回燕京留守三幅書恭持信幣甫届陪都方脩汗竹之儀特辱榮函之貺竦欽謙揖徒切感銘回中京留守赴筵書修慶誕辰假途畿壌方駐巾車之役遽申酌醴之歡叙荷意勤永藏衷素回諸州召赴筵書肅將信幣方柅軺車敢圖主禮之勤特辱賔筵之召悚藏彌切敷述奚殫回日謝中京留守召赴筵書講睦寶隣還經樂土特辱牋函之貺仍煩燕豆之陳重荷眷私倍増感悚謝杭州蒲左丞啓皓首為郎愧無功而報國朱方守土遽有請以䝉恩涓日莅官依仁為幸恭以判府資政左丞學深原本識究㡬微四海元龜三朝舊德忠以許國人無間言出鎮東南均休中外棠陰方茂斯民惟恐於公歸槐位久虚品物願依於神化某荷知有素託庇云初支郡所拘不得親承於教令輿人同欲其將再入於陶鈞謝蒲左丞薦啓伏䝉封章誤有論薦者竊以朝廷選士言取信於大臣君子愛人才不遺於片善稱揚躐等感仰悸衷伏念某賦性甚愚適時無術雖預聞於禮樂曽何補於邦家唯知固守於舊章詎敢曲從於異論自慙寡陋公則譽其該通人笑闊踈公則許其剛正昔依造化埀庇已深今託部封辱知尤重兹蓋安撫判府左丞資政存誠仁厚為力寒微弗求備於一夫推博愛於多士經營大厦國工無可棄之材旋斡洪鈞真宰無不陶之器荷恩特達鏤骨深銘期勉力於後圖庶不辜於先鑒交代啓叨被聖恩獲承府政夙敦事契益抃悃悰交代某官臺閣元英朝廷碩哲久淹大用屢易名區方此召還佇膺顯拜顧䝉成之甚幸愧代斵以非工頼有餘風得為來範聨登桂籍已均兄弟之親交受竹符愈重子孫之好披瞻在邇跂望尤深賀無為知郡啓伏審涓辰巳諧視印恭惟慶慰某官世傳忠義天禀賢明分宵旰之憂惟良共理為生靈之福易地皆然江民方切於去思須郡久歌於來暮五月而報即聽政成一節以趨佇聞君召某竊嚮風有日拜徳無階顧惟父母之邦幸陶雅化重計廟堂之器難久外藩伏乞上為朝廷精調寢膳回賀王敏甫學士館職啓竊審光被寵恩進膺華秩自聞成命彌切忭心伏以圖籙秘藏上帝名之册府賢能叢聚前古謂之蓬山豈徒收校籍之勤蓋所重育材之地文章翰墨得士為多輔弼公卿由此其選時髦顯擢輿論僉歸恭惟判院學士國器宏深天資茂粹綵衣就養業詩禮以趨庭青雲致身角英雄而入彀衆識高譽名重上知方挺秀於相門再假途於儒館金匱石室讎千載之遺文鈿軸牙籖傳一家之舊物經綸有素步武曷量固宜自負以軒昻敢謂不遺於鄙賤連城至寶過僻陋以暗投萬里亨衢知扶搖之逺到銘深肺腑留示子孫賀馮待制知揚州啓伏審輟班近侍出鎮雄藩凡預庇庥伏増慶抃恭以知府待制器深廊廟德粹圭璋分注上憂暫從外補溥天之下搢紳推翰墨之師自淮以南籌幄賜生靈之福佇聞節召入贊鼎司某幸以不才叨佐屬郡燕雀微羽棲大厦以在期荆棘凋叢戴卿雲而有日伏乞上為宗社調䕶寢興瞻望旌麾下情無任欣躍之至賀吳司諫館職啓嚮審光奉寵書榮陞秘館伏惟慶慰某官修誠端本造道資深擢自賢科任當諫列盡忠補闕増帝衮之文章執節彈邪聳王朝之䋲墨聰明眷注中外樂趨㑹芸閣之掄才慶蓬山之得路牙籖鈿軸緝唐室之遺經金馬石渠踵漢儒之故事豈圖謙德先辱珍函曩屬居憂久稽馳慶感悚之至併集所懷賀歐陽樞宻啓嚮審光被制書榮陞樞府伏惟慶慰某聞宥密之職太平所基賢哲在官生靈受賜豈獨一時之福實為長世之休恭以樞宻侍郎上台元精清廟重器文章道德素推天下之宗帷幄籌謀黙賛聖人之治剸裁㡬務協契輿僉將使朝廷無萬里之憂夷夏服兩階之化三山僊路昔㳺翰墨之林九重帝心今注詩書之將安危所繫中外具瞻永扶丕圖大庇羣品賀南京留守張端明啓伏審抗章得請出鎮榮歸於朝廷則地重而寄優在閨門則意承而色順由聖賢之相遇致忠孝之兩全惟侍奉親闈燕安里社明珠還浦故都増川媚之輝靈鶴歸遼舊俗有羽飛之望上方眷求元老虚佇嘉謀行聞節召之嚴入被鼎司之拜用爲霖雨徧敷潤於邦家勿剪甘棠永垂陰於桑梓某夙承奬擢即預陶鈞趨覲未前具瞻尤切伏乞上爲宗社調䕶寢興賀東宫待制啓伏審光被寵書榮遷峻秩伏惟慶慰竊聞職清内閣任重先朝必擇正人以副輿望恭以某官搢紳䋲墨廊廟棟梁爰自春宫夙隆天眷商山舊徳漢皇之羽翼已成秦府功臣唐代之典章取定即升台席大庇邦氓某屬在浙江叨乘使傳末由趨慶伏重跂瞻賀杭州蘇内翰啓伏審抗章中禁得請名都竊惟慶慰㳟以知府内翰識究㡬㣲學深原本忠義聳本朝之望文章爲多士之宗四近未陪輿情攸欝顧東南之㑹府益茂棠陰采中外之公言願陞槐位五月而報即俟政成一節以趨竚膺君召某荷知惟舊瞻德有期跂望旌旄卑情無任欣忭之至賀熊待制移金陵啓伏承抗章玉闕得請金陵竊惟慶慰恭以判府鈐轄侍郎待制徳重端朝忠純體國未陪四近彌欝羣情顧六代之名區鄰三吳之舊境假途紅幕欽婉畫之尚存移建碧幢實坐籌之有頼錦繡増榮於榆社封疆宻接於棠陰即趨召節之嚴難久偃藩之樂上茹都官明堂圖書某聞大禮廢非至聖莫之興大禮興非鉅賢莫之述明堂之禮其天下之大禮乎明以出政教幽以交神靈根萌於黄帝唐虞幹枝於夏商周華葉於秦漢魏晉宋齊梁陳隋唐之間剪伐於五代蘇培於今天下前曰大禮廢非至聖莫之興者此之謂也然而朝廷林藪臣子億萬舉知大禮之興鮮能述所興之禮惟閣下既能知之又能述之作爲詩頌奏露天子若夫造化之工張列三辰羅布萬物以文飾天地未足狀其功也秋江夜濤春山曉雷浩浩轟轟犇震不絶未足狀其辭氣也孤竹之管雲和之瑟圓丘六奏感徹太極未足狀其音容也神仙之庭嶽瀆之藏阜積金玉淵聚珠貝未足狀其富學也是以聳動旒冕特詔褒寵外藏之太史氏千萬載後爲世盛事前曰大禮興非鉅賢莫之述者此之謂也某襟衣塵埃聞見寡隘閣下辭學敢望之乎二者不敢有望於閣下於閣下之功固不敢有所望也然而心膽壯鋭不甘無述故搜歴代明堂之制於經經不足以及乎傳傳不足以及於史其文雖得其象莫見廼索文而求象據所象而爲圖圖成而其篇二十歴代之制敢謂十得其八九矣其有辭枝義失世所不從則略而不取其所以不自赧縮逺從山林敢投獻於門下者非徒然也欲乞閣下政餘賜覽損益差繆以足其心爾閣下不以寒賤爲卻而從之則異日國家建明堂訪古制某進所圖無復畏懾矣非獨爲寒賤之光抑亦使當世知閣下風化之致焉上金陵知府書傑無爲人以淮南方伯之召而客於楚聞南使過楚楚人有問之者曰爾不逺萬里將有獻於朝廷其何物耶使者曰炎海之濵有獸其神若兕匪兕若麕匪麕一角載義四蹄履仁行以中矩逰而不羣爲世之瑞命之曰麟楚人曰角之戴義義不足以尊尊蹄之履仁仁不足以親親行之中矩不足以為世法逰之不羣不足以為絶倫匪兕匪麕麕兕之鄰瑞之來何所補於吾俗瑞之隱何所損於吾民世之治亂在乎人孰謂繫於斯麟使者屈之黙然而去有士於此少而窮仁義之原長而得仁義之道非仁義之行不敢以行非仁義之言不敢以言不生於窮荒之地而生於中和之域不求知於獷俗而求知於大賢或遇其知而獻之朝廷則非獨使萬目之駭其必有補於世而不玷乎大賢之知雖不足以爲天下之瑞而亦無愧於是麟也願閣下少加意焉伏惟閣下富文老學天下宗師所黜所譽士林權鑑傑世族寒賤人所不顧今日之來不敢以諂言支説取瀆大君子敢以所聞獻於門下以俟進退無爲集巻十一

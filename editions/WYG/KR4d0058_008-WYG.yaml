  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0058_WYG_008-1a, image: WYG1099/WYG1099-0716c.png}
body:
  text: 無為集巻八宋楊傑撰序皇族服制圗序議曰禮院新定皇族五服圖其失有五不重太祖太宗真宗之服其失一也不分潤王之族其失二也不載兄弟之殤其失三也不著袒免之親其失四也不明正統旁親之制其失五也何謂不重太祖太宗真宗之服按周禮司服職云為天王斬衰禮記云天子修男敎父道也為天王服斬衰服父之義也又云䘮有四制變而從宜取之四時也有恩有禮有節有權取之人情也恩者仁也理者義也節者禮也權者制也仁義禮智人道具矣故為父斬衰三年以恩制者也為君亦斬衰三年以義制者也新圗以皇帝扵仁宗固當服斬衰也於真宗則齊衰不杖期也於太宗則齊衰五月也於太祖則緦麻三月也若仁宗之服誠合禮制矣若真宗太宗之齊衰太祖之緦麻是以親服而言而不以天王之服言也夫太祖太宗真宗君天下傳萬世在皇帝為之服斬衰此所謂以義制者也親親尊尊無重於是矣新圖以齊衰緦麻為服是豈達禮經之意哉故曰不重太祖太宗真宗之服其失一也何謂不分潤王之族按五服勑云為人後者為其父母齊衰不杖期為其兄弟大功九月然則皇帝為濮王之服異於為潤王諸子之服矣為濮王諸子之服異扵為潤王諸孫之服矣新圗以潤王子孫合而為一無以别其等降故曰不分潤王之族其失二也何謂不載兄弟之殤五服勑云為人後者為其兄弟之長殤小功三月為其兄弟之中殤下殤緦麻三月開寳通禮喪𦵏令文皆同其說盖出之扵儀禮矣而新圗略之故曰不載兄弟之殤其失三也何謂不著袒免之親按禮記大傳曰名者人治之大者也可無慎乎四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣鄭康成云四世共髙祖五世髙祖兄弟六世以外親盡無屬名也又按律有八議一曰議親釋謂皇帝袒免以上親刑統云皇帝袒免據禮有髙祖兄弟曽祖從父兄弟祖再從兄弟父三從兄弟身四從兄弟是也且五世之親旁通而有十一刑統止著其五識者猶曰未達况又全而闕之哉故曰不著袒免之親其失四也何謂不明正統旁親之制夫正統之服天下之通服也旁親之服大夫則異於士庶矣天子諸侯則又異於大夫矣按禮記云期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也鄭康成云期之喪逹乎大夫者謂旁親所降在大功者其正統之期天子諸侯猶不降也大夫所降天子諸侯絶之不為服也孔穎逹曰大夫之尊猶有期喪謂旁親所降在大功者得為期喪還著大功之服若天子諸侯旁親之喪則為服也又儀禮喪服鄭康成注云君大夫以尊降賈公彦云君大夫以尊降者天子諸侯為正統之親后夫人與長子長子之妻等不降餘親則絶天子諸侯絶者大夫降一等又漢白虎通德論天子絶期者何示同喪於百姓明不獨親其親也又魏田瓊云天子不降其祖父母曾祖父母后太子嫡婦其姑姊妹嫁於二王後者皆如都人此所謂正綂旁親之制也古者分親所以尊正綂也尊正綂所以重宗廟社稷之事也雖聖人親親之心篤於九族而旁正之異不可不明也而新圖略之故曰不明正統旁親之制其失五也今别為圖分以世次上下旁行而觀之親疎輕重之制其亦庶乎明矣國朝宗室世系表序漢有王子侯表唐有宗室世系表其子孫之盛槪可見矣然漢表止於王侯王侯以降族裔不可得而知也唐表略於明皇明皇以後本支不可得而詳也夫宗室為邦家所重其簡闕若此豈非紀事者之失歟國朝之制凡宗室行封襲慶賚之典有婚姻喪祭之事雖命令所出本乎朝廷而法度參考必先禮籍是以宗室世系戚疎逺近之别尊卑長少之序為禮官者所當審考而詳明之也某備員太常積有歲月參考典禮兹固所職其於戚疎逺近之别尊卑長少之序敢不盡心哉而有司之所記者先後詳畧多或異同檢用之際竊懼差失迺推究源流作國朝宗室世系表太祖之子名以德德生惟惟生從又生守從守生世世生令令生子太宗之子名以元元生允允生宗宗生仲仲生士秦悼王之子名以德德生承承生克克生叔叔生之之生季曰德曰元者宣祖之孫也曰惟曰允曰承者宣祖之曾孫也曰從曰守曰宗曰克者宣祖之六世孫也曰令曰士曰之者宣祖之七世孫也曰子曰季者宣祖之八世孫也首著諡號名推爵德也屬次之親親也子孫次之源深而流長也謹序熙寧太常祠祭總要序國朝歲祫天地五方帝神州宗廟大明夜明大社大稷太一九宫臘䄍為大祀文宣武成風師雨師先農先蠶五龍為中祀壽星靈星中霤馬祭司寒司中司命司民司録為小祀凡太常典禮樂少府共服器光祿共酒齊黍稷果實醯醢將作共明水明火太府供香幣太僕共牛羊司農共豕葅有司應命人或為之騷然熙寧四年冬詔以諸寺監祠事𨽻於太常所以肅奉神之禮也太常初置主簿傑首被命至局之日寺監羣吏各執故習惘然不知祭祀之聯事傑迺集諸司所職為旁通圖一巻以示之於是上知其綱下知其目大事從其長小事則專達郊廟羣祀渙然易明有司百執各揚其職職事相聯罔不修舉命曰熙寧太常祠祭總要云補正三禮圖次篇序周禮六篇首曰建國國建而其所重者天地之丘壇祖宗之廟貌也三者旣安則不可無宫室庠序之嚴衣冠車旗之飾寶貨物用之利物物得正和樂生焉有所未和和之以樂有所未正正之以威物正於國則厯象順於天厯象順於天則災咎消於物格災咎於一時傳簡書於萬世故禮圖之次一曰地制八巻二曰丘壇三卷三曰宗廟二巻四曰宫室五曰庠序共一巻六曰衣冠三巻七曰車旗三巻八曰寶貨一巻九曰物用三巻十曰樂制一巻十一曰武制二巻十二曰厯象三巻十三曰失令災應共二巻通圖議三巻序目三巻為三十八巻伏惟聖主覽其所圖鑒其所次法其所大法行其所未行致休祥為簡書之傳無災咎為號令之應厯象得而順禮得而正樂得而和寶貨物用得而利衣冠車旗得而飾宫室庠序得而嚴丘壇宗廟得而安天下之地得而制然後聖神宗支傳億萬載此愚臣次篇之意也平律書序世之所以治者以人之和也導其所和莫深於樂樂之所準在乎律吕是知律吕者大樂之權鑑而世治之本原然而上聖立法後世難知為之之物惟三謂玉銅竹正之之法惟五謂數聲度量權相生以八如黃鍾至林鍾林鍾至太蔟之類損益以三謂下生者三分損一上生者三分益一禘祭則不用商聲謂三大禘律吕不用商變聲則止於宫徵謂七聲有變宫變徵六管上下班志有所差謂蕤賓夷則無射損而下生大吕夾鍾中吕益而上生三綂餘分遷史有所失謂黄鍾長八寸七分太蔟長七寸二分二林鍾長五寸七分四若此之類義深者多故臣著平律書三巻律吕圖三巻以明之所以副尊號皇帝景祐修樂之至意也謹序楊氏世譜序楊氏姬姓也其先曰尚父伯僑葢周武王第三子唐叔虞之後始封為楊侯楊侯生文文生突晉之公族食邑於羊舌突生職惠公上卿職生肸字叔向亦曰叔譽晉太傅食采楊氏邑肸生伯石字食我以邑為氏號曰楊石伯石生章征東大將軍華山侯始居華陰章生欵字太初秦上卿後除𢎞農始作家譜以示子孫欵生碩字𢎞逺隠居華山仙谷見五星聚東井知漢必興後為太史碩生喜字幼羅從漢擊項羽封赤泉侯諡曰嚴喜生敷字伯宗襲封赤泉侯諡曰定其後為新昌院敷生𦙍字無害襲封赤泉侯𦙍生敞字君平任大司農御史大夫封安平侯預謀立宣帝拜大丞相敞生忠封安平侯諡曰頃忠生譚字君公大鴻臚卿屬國安平侯譚生寶字稚淵漢明帝三詔不出諡曰静節先生嘗有靈雀銜環之瑞寶生震字伯起漢太尉稱關西孔子畏四知惟忠孝清白以傳子孫震生奉字季節後改名衆字君師任諫議大夫河東太守遷中書侍郎奉生旉漢黃門侍郎其後為東垣宜陽房旉生纂字叔緒獻帝時太中大夫封常山王纂生品字文璨魏文帝時太中大夫品生國字彦髙晉武帝時𢎞農令國生準晉太常準生林其後為滎陽房又蜀中院譜林乃準之後林生鉉鉉生結仕慕容氏中山相結生繼繼生暉洛州刺史諡曰簡暉生恩河間太守恩生鈞魏朝越國公諡曰恭鈞生儉一名倫字景則西魏時封夏陽靖侯倫生文异字文殊隋刑部尚書文异生安仁安仁生德德生立立之孫曰隠朝為郃陽令隠朝生燕客臨汝令燕客生寧國子祭酒寧生漢公字用乂為天平軍節度使檢校户部尚書其後為淮南院蜀院閩院漢公生範字憲之楚州刺史範生玢字表文吏部尚書監察御史其後為揚州丹陽房玢之孫徽字隐父初自靖康里挈族來淮南是為淮南府君徽生南宅府君昺橐臯府君杲杲生濡須府君德明德明生富字文翁次大夫復字庶㡬次試秘書省校書郎㝢字晏之富生僖价佸僎佃復生傑傳伋作佺㝢生侁仲依傑生洙滋泳浩傳生滂伋生濛汶作生枹樸榛佺生涇洞洙生堯叟滋生襲吉襲圭是為淮南院子孫熙寧元年同南海監郡尚書郎沆及其子上卿客卿列卿㑹於豫章兩院各出世諜若合符契至元豐四年秋傑以禮官准詔祀華嶽乃拜太尉祠冢訪講堂藏書穴酌阿對泉於龍岡道過好陽省五公墳畫圖隠碑以歸參考宗支得閿鄉華陰譜本末尤詳元祐五年歲次庚午三月吉日重書於㑹稽妙峯亭第四十七世大宋左朝請郎尚書禮部員外郎傑序獻詩賦序彭城古之楚也山陽今之楚也古楚之劇其猶今楚之劇也古舉其守亦猶今之舉其守也在東漢則袁卲公以能理劇為三府之舉而守彭城在本朝則中都公以能理劇為牧伯之舉而守山陽古今雖異易地則同而自下車之初躬卽庠序振起風敎修衛桂陽之故事是以庠序之士首形詠歌傑幸為諸生之師而耳目盛美故擇題於袁衛二傳以理劇拜楚守賦下車修敎詩為十八日之課文在於彼而義在於此將使編民知良二千石有古君子之風云爾伏䝉傳命見索所撰謹與諸生之課上獻浼瀆視聽無任悚惕之至大樂十二均圖序大樂十二律律各有均均有七聲更相為用聲協本均則其樂調聲非本均則其樂悖非獨雅樂若此至於燕樂亦莫不然唯工師之明於聲者則能知之工師知其聲而不能知其本因聲以求本窮本以知變儒者之事也今黃鍾為宫則太蔟姑洗林鍾南吕應鍾蕤賔七聲相應謂之黃鍾之均餘律為宫者倣此禮曰五聲六律十二管還相為宫漢志曰宓羲氏作易紀陽氣之初以為律法建日冬至之聲以黃鍾為宫太蔟為商姑洗為角林鍾為徵南吕為羽應鍾為變宫㽔賓為變徵此聲氣之元五音之正也夫五音相生而獨宫徵有變聲者何也曰宫為君商為臣角為民徵為事羽為物君者法度號令之所出也宫故生徵法度號令所以授臣臣所以奉承者也徵故生商君臣一德以康庶務則萬物得所萬物得所則民遂其生矣故商生羽羽生角也然臣有常職民有常業物有常形形不可以遷遷則失其常矣商角羽三聲此其所以無變也君揔萬化不可以執一方事通萬務不可滯於一隅故宫徵二聲必有變也今著大樂十二均圖一巻旣備載律吕宫調又各取一章附於篇按圖考聲下可以辨工師之能否窮本知變上足以贊聖明之述作云爾謹序無為集巻八

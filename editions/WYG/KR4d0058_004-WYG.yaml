front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0058_WYG_004-1a, image: WYG1099/WYG1099-0696c.png}
body:
  text: 無為集巻四宋楊傑撰古詩豐湖歌恵州風土隔世埃使我南望長徘徊昔年霹靂轟蓬莱六鼇踉蹌海面開一峯崪屼九霄落萬里怒濤推擁来至今浮在羅山畔玉閣石梁挿天半世人可見莫可登雪棧雲梯知㡬層近聞更有豐湖好環匝亭臺映洲島野叟忘機鷗鷺閒寒潭無浪蛟龍老雲歸洞府月滿灣客巻綸車魚在藻白玉抽苗萬盖圓翠光期壓王孫草天髙日暖荔枝香風撼一川紅瑪瑙主人丹鼎飛金虎豐湖無根豈䏻住一日地軸如走丸隨逐浮山還舊處謝公約恵墨竹圖幽人漬墨寫成竹變化琅玕作𤣥玉公約贈我兩大軸不比丹青凡草木六月都城苦炎燠車馬紛紛正馳逐曲臺官冷晝掩闗浄掃虚堂展霜幅簾間忽有微風来不動纎枝清滿屋憶得扁舟載雪時曽寄㑹稽江上宿和謝判官宴南樓邂逅南軒須水濆名言間發蘭桂芬道義相投有餘樂賔主交照無繁文忠臣寤寐在北闕古風歌詠追南薰出闗不覺行役苦舉頭時見孤飛雲送李辟疆李辟疆濡須别我逰池陽别後不得信不覺青女三飛霜每見世俗仇讎盃觴桎梏文章憶君酒怪吟狂徃徃登髙崗但見大江水茫茫九華峯青蒼使我増悲傷明堂禮後一百二十日忽騎蹇驢訪我来池陽倒覆我巾箱得我弊藁數十張索我狂書八九行吿我明日逰帝郷我知利民術君心十年藏青雲一萬里此去髙翶翔白月池鑿池待明月池成月自来一從幽人去明月来㡬回乳竇走龍蛇斷崖激瓊瓌安得藉磐石泛我癭木杯留題張尉隠齋小隠隠林藪大隠隠朝市市朝心隠不隠身山林未必忘名利夜来月明竹聲細隠齋主人留客醉四更客未醒主人促車騎客笑主人勞不顧隠之意君不見梅福曽作尉民官莊周亦為漆園吏酒隠園小隠隠山林大隠隠城郭城郭多紛囂山林苦淡漠不如隠於酒適意自斟酌屈原不䏻飲獨醒較清濁揚雄雖願隠載醪無適莫吏部甕下卧其隠可愧怍翰林市上眠其隠太落拓孰若畸翁園醺酣得大樂風暖鳯凰集霜重梧桐落長嘯待明月明月出林薄倚杖傲浮雲浮雲度寥廓雖近市朝路不為名利縛知我尚幽勝賦詩豫期約願言醉鄉逰一駕東飛鶴上池沃瑶漿冲氣溢金杓當知隠君子志不在糟粕及第東歸逢元舉與君去嵗金陵逰七月十日離楚州酒闌浩歌古亭下白日雷雨催行舟片帆乗風破險浪冉冉飛過蘆花洲我時幸預鼇頭薦君以才術公卿留人生聚散散或聚忽忽今㑹如萍浮君行何以贈君别莊鵬九萬摶髙秋丞相王舒公賛天子元老坐而論道赫赫具瞻傅巖惟肖都尉王居士賛珠圎而明玉澤而温鑑瑩澈而絶塵芝秀發而非根曼殊沙華栴檀香芬晦堂路險大開施門西江水深一口平吞誰知威音已前正是王老師孫三江魯府君賛三江府君有徳有文善政及物隂功恵民異木連理雙芝共根詩助風教道傳子孫斯人一去莫可見萬里西山空白雲治平三年秋七月當塗郭功父招無為楊次公㑹於環峯時五雲叟陳徳孚以詩寄吾二人因聯句酬之空山坐寥落疋馬邀俊哲入門肆髙談清風掃煩熱功父憶昔治平年姑熟溪上别歲時激箭急倐忽三十月次公讀書非少銳欲論先巻舌歸田殊未成累累逐羈紲功父孰謂趙魏老不能佐滕薛由來歲大寒松栢見孤節次公朋心乆愈至忠規補殘缺兒童喜父執飣餖成羅列功父壺有玉泉酒庖有冰裙鼈野芡剖珠璣秋𤓰咀霜雪次公新粳刈且舂香炊軟三淅放七聊醉飽百憂旋磨滅功父升平擊堯壤險怪探禹穴吐氣直虹霓落筆淬金鐵次公詞源河漢翻俯視隄防決文章貴天成追琢譏竄竊功父抵掌萬古事高下争螘垤挹酌華陽水蕩滌塵土咽次公吾心了何染本理忘巧拙聖賢乆不作情偽愈分别功父竹陰卧片石浩歌聲欲闋山童倐及門喜音屈高潔次公傳聞脫世累天境妙搜抉疎簾巻危閣九峯青嵽嵲功父吟餘琴一弄鏗然響環玦老鶴不敢鳴十里飛雲絶次公次公君素交嗟予尚契濶疇能枉籃輿相期出寥泬功父崔仲岳隠居松江以丹白黑飾舟曰鶴舟括蒼周子韶無為楊次公治平三年夏六月㑹仲岳於繁昌蓬萊亭勉其罷鶴舟以應書席上聯句送之且就飛龍牓休登白鶴舟子韶隴書方勸駕閬苑莫回頭次公丹頂歸滄海霜翎擲素秋子韶海鵬期變化仙驥任沈浮次公煙月閒三島功名重五侯須知馳鳳詔便是釣鼇鈎子韶巳得沖天便無思擊楫遊次公楚醪鏗逸韻湘瑟助𡨕搜子韶南浦成春别北山空夜愁九臯聞象魏一葉寄汀洲次公世氣騎風虎機心走海鷗子韶昔年嗟鷁退今日並麟遊次公八月仙槎駛千齡聖運優市朝真大隠箕潁謾清流子韶鼓枻雖漁父乘桴笑仲由片帆從此巻舊氅亦應留次公冠珮重華國鶯花四皓樓雄文高鴈塔大醉憶蓬丘子韶勲若書青史幢須建碧油蘭橈好重舉乘取上揚州次公送沈漢卿拜母墓效孟體慈母塚前柏孝子眼中血根在葉長青恩深淚難歇二月黃鶯鳴一路𤣥猿咽牛渚磯修水府祠并序牛渚磯在太平州之北里即温嶠燃犀之所也石岸險隘江流湍激頗為舟檝之害中有水府祠南唐保大年封其神以王號國朝祥符中從而加封舟人将過之必先陸走具牲幣以禱焉及慶厯初朝命開新河於磯後而獲安濟則禮事稍損祠宇多敝嘉祐七年章太守命修之傑因賦之且警來者牛渚磯大江汹汹山險巇舟人欲渡不敢渡烹牲投簡先禱祈自從䟽派得安濟禱者漸踈祠宇隳我聞鬼神若君子不以風濤為福威吁嗟人心自險易昔也兢兢今也違太守修祠豈無意寄語安者毋忘危至㳺堂人孰不好㳺外物常求備佳勝窮山海紛華樂朝市不知務内觀未得㳺之至達士靡窺牖天道已昭熾六合極周流萬化覽要㑹瀟灑須川守名堂慕髙致政清民訟簡庭木交蒼翠間闗林鳥鳴跳躍池魚戲逍遥成詠歌吏隠欣得地視聽與人同所適與人異翻笑列禦宼不出終身愧吾亦愛吾廬豈獨壺丘氏無為集卷四

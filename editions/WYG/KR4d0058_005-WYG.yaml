  - {type: page-break, offset: 0, content: '', id: KR4d0058_WYG_005-1a, image: WYG1099/WYG1099-0701a.png}
body:
  text: 無為集巻五宋楊傑撰律詩元㑹歲令春為首人君德體元宸居太極殿星拱紫微垣厯運千齡協梯航萬里奔同時稟正朔大號一乾坤謀野曾緜蕞沿波未滌源典章歸獨斷期㑹肅常尊禮樂諧虞舜師儒陋叔孫曲臺司肄習執法糾譁諠舊史精窮討非經不引援殊疆今輻輳古轍此還轅陛峻黃麾建旗張直葢屯地圖包海畫庭燎徹宵燔班位分賢戚銅璣定曉昏仙盤凝沆瀣禁漏㵼潺湲呼旦傳雞唱填街列虎賁六軍衣錦繡八駿轡璵璠綬采由官别冠梁以秩論國容修鹵簿武事設櫜鞬鼓吹依宫架關扄闢路門簴文雕猛鷙路飾繢蟠蜿牙瑑中嚴版珠聯告止旛金牀置符寶土貢雜瑶琨百辟稽名實諸王固屏藩立墀隆輔弼述職簡要畨省寺興頹敝材能慎選掄班齊序鸞鷺仗轉駭鯨鯤圭鎮唐儀易袍紗漢制存鞘鳴龍扇合簾巻獸煙噴陟降天威重顒昻玉色温泰平安可象造化本何言恱豫陰陽盛淵深宇宙呑江河宗渤海山岳望崐崘牘奏龜麟應書先稼穡繁歴階臣委佩宣詔使臨軒進有稱觴慶初無解劒煩南山賦周雅北斗揖堯樽濟濟華夷抃雍雍信義惇登歌形瑞物旅舞異棃園翠鳳聞簫集朱熊負案蹲四清備鐘磬二律下匏塤寵錫需雲澤均霑湛露恩拜吟三夏享饔盛九牢飱受觶充醇醴加肴飫熟蹯摰勤供鴈雉羞潔具蘋蘩布治從丹闕懷仁感陸渾祥光騰廣坐和氣冒陳根蓬島風長習扶桑日向暄前楹秀芝草阿閣長鶵鵷社稷生靈福邦家政敎敦年年朝溥率基業壯中原景靈宫仙宗司玉厯帝系出璇霄功業超千載威靈㑹六朝聖孫嚴子事神武耀文昭游渭衣冠在違顔咫尺遙奉安先上衮守衛肅中貂重屋華天篆櫺星屏俗囂麾幢迎寶輦象魏起祥飈霞醴充流瓉芝房陋焫蕭降升瞻穆穆謦欬聽寥寥複道悲追漢靈旗想伐遼薦新隨四孟觀德序三昭養慕諧虞氏聲明格有苗庭分五行舞樂奏九成簫將相旌遺烈松筠鑒後彫肖巗非特說畫閣豈惟喬寰海名王聚江湖王氣銷基圖傳乆大宫闕壯嶕嶢皇澤彌霶霈羣生荷益饒侍祠叨旅進賡頌仰材翹孝治光青史瓊瑤合瑑雕皇帝朝獻景靈宫天元殿門有靈芝為瑞時備員博士前道聖駕得預瞻仰獲綴賀班賦詩上進原廟躬朝獻高真監孝思僊源傳寶厯乾戸産金芝火德資生毓天元固本支靈華依玉宇瑞物陋銅池大慶同榮茂甘泉殺等夷洪休均草木嘉應在仁慈舜舉重瞳目堯開八采眉祥光齋殿照喜氣輔臣知三秀書圖牒千齡保福禧願如郊祀樂志府播聲詩過黃陵廟黃陵二妃廟客過動愁顔湘水有時盡帝車何日還血斑千畝竹魂斷九疑山欲問蒼梧事白雲生棟間李翰林祠半醒半醉遊南國浮利浮名重一毛天上星精鍾太白人間文格埓風騷仙翁曾換金龜酒老筆空傳紫兔毫姑熟遺音千古在長隨春色滿林臯簡寂陸先生祠紫霄峰下陸先生飛出紅塵鶴羽輕高第不知朝玉闕舊山重喜見霓旌斗壇石凝雲三尺丹井泉寒月一泓昨夜全家宿琳館尚疑雞犬有遺聲延陵季子廟戰國干戈禮義隳延陵高節救周衰當時若嗣諸侯統後世誰傳十字碑生死不欺留劒約興亡都在審音知名儒如欲修前史列傳應須次伯夷和伯瞻郎中登郡城北樓樓上高吟思入微白雲隨步拂人衣幾行塞鴈斷不斷千里客帆歸未歸倉廩稻粱知國富弟兄疆境樂家肥望中孰謂長安逺路去江南只數圻和程太卿雨中登物華樓澤國連朝雨春山半夜雷登樓寒食近隔岸畫屏開沙鳥飛還止漁舟去復来年年南浦草相伴緑波廻夏日天慶觀水閣錦繡堤邉曲徑通登臨不覺俗愁空聲喧枕簟芭蕉雨香撲罇罍菡萏風池景信皆塵外物道家疑在畫圖中南樓有客頻回首應認蓬莱第㡬宫題具區閣閣占具區澤登臨萬象竒中秋月明夜平旦日生時雲淡雪千里水澄天四垂漁舟何處在一笛順風吹子隠臺平西義戰㡬百載江左空遺子隠臺鄉俗尚傳三害去地基曽見六朝来人隨逝水年年逺山似屏風面面開誰與宜興尋舊宅至今藏在白雲堆余卿新第章水營居不日成皇華詩價敵連城簷牙雨過千鱗碧池面風開一鑑清脩竹短牆儒者宅白頭青眼故人情莫憂退處生涯薄鶴引新雛遶砌行和酬子中舍人待次歸来偃月城鄰公笑我拙謀生藏書有穴期傳世負郭無田不問耕朝市風波誰㺯險江湖魚鳥自忘情吴門建第君何晚水閣山齋到便成榮老堂知節能全節辭榮老更榮閒居玩圗史得意傲公卿自有琴藏匣何須金滿籯子孫承義訓力學重清名和穆父待制竹堂㑹稽風土竹相宜傍竹為堂趣自竒内史舊居經㡬代此君髙節似當時林無暑氣客頻到笋過鄰牆僧不知莫夾桃花引蜂蝶實成須與鳯凰期清軒湖水山一色湖山屏四圍無風自瀟洒有月更光輝洗滌塵埃静消磨暑氣微平生方外樂到此欲忘歸浮玉僧建亭蒜山之頂丹陽新舊太守林子中楊次公首登之因名二翁亭來陪杖屨躡孤峯故老旁觀歎二翁海上波平千里白江東兵壯萬旗紅雲開雲合山頭月潮落潮生渡口風須約䝉莊老仙客凭欄直下看龍宫折栁亭和林子中行人折栁楚江頭帆去帆來幾日休飛絮不知漂泊苦展眉誰顧别離愁五株彭澤清風在千里隋隄勝氣浮莫惜一枝臨水贈使君將解濟川舟淮陰千金亭良將未得用㡬人能賞音恩難忘一飯報肯惜千金舊俗喜出胯後時空愧心至今重風義廟食配淮陰玩鞭亭晉祚衰微鼎欲遷夢驚營壘日回旋强臣駕馭無長䇿追騎留連有寶鞭險捋虎鬚曾幸免怒形蜂目亦徒然誰能杖箠平兇亂千古荒城鏁暮煙同浩然正叔賦夏英公宅延春亭得登字九衢塵土衮車聲一到延春世慮澄暖律解敎寒谷變熙臺還許衆人登蘭生舊砌香連續花入名園價益增莫笑冷官聯騎過長安城裏有誰曾和晚登故豐門故豐門近子真家樓上高吟氷齒牙帆似馬來思杜牧劒為龍去憶張華溝還故道穿城角沙漲平川壓水涯江外西山銜落日㡬重蒼翠襯餘霞張司封泗上春運經綸才術致唐虞暫出東南摠轉輸德敎乆為諸郡法國家何止十年儲清風繼世留淮甸和氣先春入汴渠不日召歸調鼎鼐一封天上紫泥書遊北山今古忙忙利禄間幾人能此叩松關猿驚鶴怨不知處虎踞龍蟠空見山芳草路隨流水逺老僧心共白雲閒淮南舊隠抛離乆一誦移文一愧顔書寶山寺壁片帆曾渡謝家洲屈指於今十九秋沙鳥重歸迷戰島釣磯空在憶浮丘蒼顔白髮生新感疎竹清風伴雋遊借問蓬萊山上月停杯還記故人不遊寶林招李簿梅尉東郭乞求聞曉雞籃輿乘興過涇谿氷開波面白玉碎雪壓竹梢青鳳低仙去空留鍊丹井境清疑有辟塵犀子真太白曾孫在飛棹何妨到水西御試求遺書於天下炎德侔三代文章歎燼餘千金期重賞諸郡購遺書東魯藏經出西秦挾律除儒生搜簡畢謁者騖軒車闕史修蘭省亡詩補石渠願觀新四部清禁直明廬無為集巻五

body:
  text: 無為集卷九宋楊傑撰序祝先生詩集序先生諱熙載字舜咨自三衢游國庠登進士第任朝奉郎守祕書丞老於吳之華林先生悟風騷蓋其出於天性幼時見鄰家童誦劒池詩云林風搖脫影山月瀉秋光時六嵗遽諭之曰豈非林風搖晚影耶傳者誤爾鄉先生許洞聞而竒之及冠場屋有聲名和文李公以禮幣延致門館與其二子遊厥後皆稱賢公子先生屢校文郡國得人為多丞相王祁公初應書時人未知名先生首薦之而巍中鼎科及典誥命文章溫贍天下莫不服先生之鑒然未嘗以毫髮有干於相府天下益髙先生之節平生與人交必盡誠不隱默以取恱其為政端方耻阿諂以事上故與時寡合志不得伸而其造道深篤於名教中自有樂地出處趣尚一見於詩夫莫邪干將有切玉之利而其用緩於割雞黃鍾大吕有格神之和而其音艱於衆聽靈草指佞而姦邪憚之寶鑑燭隱而魑魅惡之某嘗出先生之門知先生為最深故述詩序云唐史屬辭序仁宗皇帝嘗謂商周以來為國長久惟漢與唐不幸接乎五代衰世之士氣力卑弱言淺意陋不足以起其文而使明君賢臣雋功偉烈與夫姦虐皆不暴其善惡以動人耳目誠不可以垂勸戒示久逺乃詔修舊史以成新書是時內出四庫所藏外訪求遺事於天下若文集志刻野語逸史搜索殆遍而其刪定討論皆一時儒學之士凡十有七年而後成于是與漢晉諸史方軌並駕以垂無窮吁可謂盛矣嘉祐中其書新出而天下之士傳録誦讀惟恐其後時無為程鵬彥升篤愛是書乃采一代事迹四言成文兩兩相比題曰唐史屬辭總成四卷其於善惡邪正雖皆因其傳文而於輕重諧偶若權衡然可謂勤且至也觀者用力少而收功多將求鏤版以廣其傳丐豫以為序彥升有學行豫科場友也初命錢塘掾上官稱其材將見其所施設此未足以為彥升道元祐元年閏二月一日泗州青陽述五代紀元序有唐之衰五代起于藩鎮梁祖始以姦雄窺竊神器雖天下畏其强盛而弒逆之禍在於閨門君不君臣不臣父不父子不子於梁氏備之矣欲永其世不亦難哉夫亂臣賊子人人棄之乘其所共棄而動之以言故末帝得以誅友圭而代之然而唐德深厚人心未忘此後唐之所以興也武皇征伐屏翰之功初與梁祖相後先而梁祖終於取天下武皇終於藩國千載而後梁祖首篡竊之罪武皇保忠義之名善惡之致何其殊如是耶莊宗克成父志勇於征討平定梁氏中興唐祀議者稱之至於溺惑聲伎吝嗇賞賚此其所以亡也所謂暴威武者或困於聲色之娛屯其膏小貞吉大貞凶莊宗有之矣莊宗明宗閔帝廢帝四世三族姓異號同同尊唐室致有唐廟貌雖石晉之代亦宗祀之而不敢廢乃武皇莊宗之力也晉高祖利建大號以君父事契丹及少主嗣位欲正名分召徠敵冦割裂中夏人主后妃䝉塵異域皆高祖之罪也漢高祖有赴難之迹惜哉不克成其功當中原無主之際徇輿議而即位不猶愈於僭竊者乎隱帝不能駕馭英雄潜行誅戮傾覆宗社誠自取之爾周高祖世宗可謂英武也巳而其享國不永恭帝沖幼謳歌不歸斯蓋厯數在乎真主非人謀之所及也五十三年之間生靈困於塗炭王道衰而不振史氏蕩而無法秉筆之士為之歎息嗚呼十三主有君天下之勢而無君天下之道君無其道則賞罰有所不明君有其勢故紀元之法以託之也或曰編年繫事必具四時在紀元則梁祖不書春莊宗不書春夏秋冬者何為也曰唐厯未終不可以與梁也梁厯未終不可以與後唐也不與之所以正正統也正統不正何以正天下哉治平三年春正月序補編年圖序編年圖任山先生之所撰也始自周平訖於聖宋歲之甲乙列於上國之年世列於下稽諸史牒咸得其實先生授于建溪張君豫於張君而得焉周平而上或患其闕因自堯舜而補之夫先生之圖祖春秋也某之所補祖斷書也聖人之法相為表裏不亦可乎皇甫謐曰堯生甲申歲孔安國曰堯年十六以唐侯升為天子故即位於已亥也書試舜之年曰朕在位七十載故試舜於戊申也試舜三載曰汝陟帝位故舜攝於辛亥也二十八載帝乃殂落自舜攝之年其崩於戊寅也舜生三十徴庸故舜生於已卯也三十在位歷試二年攝位二十八年故即位於庚辰也禪禹於壬寅也正月朔旦受命於神宗故禹攝於癸卯也五十載陟方乃死故崩於己巳也史遷曰舜崩三年而禹即天子位故禹即位於壬申也皇甫謐曰夏啓元年歲在甲辰禹當先啓三年而崩故崩於辛丑也皇甫謐曰禹年百歲故生於壬戌也又曰啓立十年而崩故崩於癸丑也自啓至於周之共和不得而補年祀不明故也惟汲冢紀年曰夏有王無王用歲四百七十有一故夏亡於壬戌也夏既亡商宜有天下於次年故湯踐位於癸亥也皇甫謐曰湯踐位十三年而崩故崩於已亥也汲冢紀年又曰湯滅夏以至於受用歲四百九十有六故商亡於戊寅也商既亡周宜有天下於次年故武王踐位於已卯也共和而後皆據史遷年表而補之噫自啓至於共和年祀不明則有矣世次可得而明故載為三代世譜時皇祐二年二月二十六日序楚風序楚風者何楚人美太守之詩也詩有四始曷為謂之風本乎師乙之法師乙曰正直而靜廉而謙者宜歌風進身以道吾太守之正也不為勢曲吾太守之直也仁不撓物吾太守之靜也介潔自守吾太守之亷也接士降巳吾太守之謙也故楚人之詩有美正直而靜者有美亷而謙者得師乙歌風之法是以謂之風也清獻趙公壽塋頌序元豐二年春資政殿大學士太子少保趙公連章得謝歸於三衢是年冬卜壽塋於先塋國令公兆域之側乃自作頌題於壁間後五年公薨天子聞訃震悼輟視朝優賜賻典以太子少師告第太常考行以清獻易名尚書省集議僉以為當朝廷從以諡焉古未有也公子㞦初辭御史又辭太僕丞願就養於南國上嘉其世孝詔提舉兩浙路常平廣惠倉以便養志也及遭巨創每視壁間所書頌則號慕殞絶思刻石以廣其傳乃屬某以為序某聞患莫大於愛生纍莫重於畏死至人無巳悟其本不生故其存也無所愛達其未嘗滅故將亡也無所畏惟其無愛無畏乃能致其忠竭其孝一其誠而𡨕於道至於不隕穫於貧賤不充詘於富貴見利不虧其義見死不更其守其餘事也公之頌章首曰吾政已致蓋戴吾君從其乞身之請退而不敢忘其忠也次曰歸此山地蓋言吾親全而生之巳將全而歸之沒而不敢忘其孝也又曰彼真法身不即不離蓋了覺本源實無生滅一其誠而冥於道也公其至人乎來者觀其頌則知公之所存矣八年冬某被命典客訪道南遊將還京師得公子書至武林乃為序云石聲編序嘉祐五年夏四月儂智高叛廣南晉康太守趙公死於難夫賊勢不可敵而太守敵之不曰勇於義乎去晉康則可以生而太守不之去不曰固其守乎既知其不可敵又知其不可去而太守不自屈其節而死之不曰忠於國乎故聞太守之風者庸懦之人激而勇苟生之人激而守姦邪之人激而忠有是三者之大節而為教於天下天下賢君子得不聞而稱之乎是以具於奏牘者二狀其行事者二銘表其墓者三記於祠堂者二形於聲詩者不可遽數太守之弟殿中丞世弼集其所得詩以示傑且以序見託傑按樂記曰石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣請名其集曰石聲編將使萬世君子見其詩思其人其猶聽石聲而思之云爾太守諱師旦潛叔其字也講周禮序周禮者周公建六官致太平之書也公以聖人之德極輔相之尊通天下之志成天下之務故能作是經述是禮為萬世之大法也其略見於周官其詳載於六典六典者何治教禮政刑事也治無不統天之道也天官冢宰以掌之教無不容地之道也地官司徒以掌之和豫者禮其序春也春官宗伯以掌之正大者政其序夏也夏官司馬以掌之肅嚴者刑其序秋也秋官司寇以掌之富有者事其序冬也冬官司空以掌之治則不言而化也教則見于言矣禮則見於容矣政則見於令矣刑則見於威矣事則見于物矣此其精粗先後之序也六官帥其屬三百六十期之日也自天子諸侯至於公卿大夫貴賤莫不有位自王畿至於侯甸男采衛要蕃逺近莫不有制自天地宗廟至於百神祀享莫不有常自正月之吉至於歲終施為莫不有時自人至於鳥獸草木養之必有其道自宫室至於車服器用制之必有其法無一職不修而王道備無一物不化而歲功成此所以致太平而敬天命也不幸遭罹秦火絶滅典常出自山巖遽藏祕府冬官亡失既不獲其完書士儒相傳久巳弊於俗學聖上憫其若此命儒臣以訓釋㫖歸列之科選使成周太平之迹煥然著明於本朝誠千百年希闊之遇也然而執形器度數之學者不知制作之所存泥道德性命之說者不能考合以適用蓋學禮者之所蔽惟不執不泥然後能盡變通以致用上以副朝廷經術造士之意不其盛歟題跋題孔融四公頌華陰靖節先生寶九歲時放一黃雀其夕有一黃衣童子再拜曰我王母使者感君仁愛救拯實感存濟授以四白環令君子孫潔白位登三事當如此環其後震秉賜彪四世太尉德業相繼及曹操欲害彪時孔融為將作大匠聞之往見操曰楊公四世清德海內所瞻今橫死非辜則孰不解體融魯國男子明日便當拂衣而去操不得已而出之觀頌詩則見孔公之誠心矣此卷翰書竒古有御書印及空闕景皇神堯諱驗是唐朝內府所藏靖恭楊氏世世傳以為寶其世字民字尚未諱者蓋貞觀以前書也題范文正書伯夷頌伯夷避位孤竹責仁於周義不食粟死於首陽可謂聖人之清已其於時也不亦難哉文正公書伯夷頌時今中書丞相侍行青社三十年間繼登宰輔澤被四海有若伊尹格於皇天有若伊陟格於上帝蓋千載一時也元祐四年四月四日權發遣兩浙提㸃刑獄公事楊傑謹題題慧應大師運氣經絡圗五音之變六律之序治樂者不可不知不知是而考擊成聲者豈非偶諧歟四瀆之源百川之㑹治水者不可不知不知是而疏導有功者豈非幸中歟黃帝之書醫家所重詳究其義五運六氣猶樂之五音六律也十二經絡猶水之四瀆百川也安可忽之哉余久官奉常屢被詔考校太醫官學者之于運氣經絡通者亦鮮然後知醫術之為難矣昨見錢唐慧應大師智全所出五運六氣十二經絡圖因召而攻其所學本末皆見於黃帝之書蓋家世師承有所自矣講學之暇益精於此其濟人之心孰禦焉元祐元年三月二十有九日洞庭舟中題題浮渡山峯巖圖潛叟樂山水至浮渡樂而甚故為山之峯巖圖一曰安為其可以居也二曰怪為其有所象也三曰險為其往之難也四曰幽為其邃而異也居廣泉甘安之上也有一不及安之中也有一不足安之下也象而近之怪之上也象而或差怪之中也象而或疏怪之下也人不能往險之上也往而惕然險之中也往而或惕險之下也既邃且異幽之上也有一不及幽之中也有一不足幽之下也巳而示於達翁達翁笑之曰子所謂安安之常也子所謂怪怪之常也子所謂險險之常也子所謂幽幽之常也吾聞之大安不居大怪不象大險不難大幽不邃安乎怪乎險乎幽乎在於是圖忘其圖不盡山之勝乎此巖圖其來固久歷世狀者不知其幾人矣其如形勢尚未之辨則其安怪幽險又焉所及乎金陵僧慧淵善於水墨丹青非獨能辨其形勢至於安怪幽險悉精妙乎筆端實與造物者爭其先後也或平昔樂於山川者縱未達是境若披是圖亦可以盡得於心目矣無為集卷九

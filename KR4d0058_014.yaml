body:
  text: 無為集卷十四宋楊傑撰墓志行狀表述故溫州録事參軍陳君墓志銘元豐四年六月甲子前溫州録事參軍陳君卒於丹陽郡明年其子鄉貢進士誠自淮南來京師以永嘉太守石大夫牧之所撰君行狀來求銘於豫固辭不獲乃敘而銘焉君諱某字幾道其先開封東明人曽祖某黃州軍事推官祖某廣州南海令父隱德不仕君幼學強記日誦千言年十八以專經預鄉選後改應進士舉不第時侍講曽公侍讀楊公以君故人子謹畏習楷法因辟掌編録經筵義及終經奏補九品官初任南巢主簿邑事賴焉再調道州司理會儂賊叛廣南它境或失守人心不安乃建白郡守請集丁壯完城壁濬塹教以旗鼓號令張大軍聲以伐賊謀守從之後賊黨至桂陽境上畏而不敢前民乃安堵太守貽詩以稱之及官滿民惜其行去郡數程遇溪水湍急舟艱於進忽數十人操篙引繂以為助君怪而問之曰我道民也邦人荷司理之德久矣輒以為報爾其愛之如此再調汀州司理參軍寧化軍有盜六人持畬刀夜刈人禾田主逐之五人逸去其一獨留且殺主人邑官全獲以為六人皆強盜也獄具將就誅君曰持刀竊禾志不在殺也畏主人而去者與獨留而殺主人者異矣安可無首從以用刑邪初雖議論異同卒如君議遇今上即位赦五人者皆原獨為首者移鄉部使者洎守臣敘其事以薦於朝除姑蘇録事參軍蘇民有負公府錢自牖出刺殺吏者度其不可免乃行賂以族弟代之君聽獄能正其罪歲大凶君承郡命賑救有方全活者衆君歷宦三十年終始如一有知已二十三人其生平所為可見三任自溫州罷官將就升遷而不幸不得遂所願享年七十有子五人曰識誠諶譓皆力學從義方之訓中子曰詡出家於錢塘之淨慈為比丘四女皆有所適孫男五人孫女三人尚幼以某年月日卜葬於無為廬江某原銘曰治獄陰德可貽後昆斯言不欺當高其門故仙源縣君陳氏墓志銘溫陵吕君升卿明甫之室仙源縣君陳氏泉州晉江人故廣南東路轉運判官駕部員外郎諱從益之女聰明仁孝其質夙成甫十餘歲父母器之委以家事措置指畫皆有條序既歸吕氏吕大族也內外百口夫人恭事調睦夙夜不懈舅姑安其孝夫子諧其順娣姒尚其和宗族稱其欽媵侍懷其仁家人上下莫不宜之熙寧六年明甫出使京東夫人侍其姑自淮浙還京師在道被病與明甫遇於宋城明甫為留醫治之數日疾不損夫人瞿然起曰子銜命出使王事也不可以妻故而淹上新擢子恐忌者得以藉口明甫憐其意即日為命駕既訣怡然謂明甫曰勉力使事勿以家為恤度明甫行且逺即呼其兒女泣告之曰吾疾殆弗興爾父方逺使懼罹其憂弗敢以情告也竟以其年八月二十九日終於京師享年二十有八前死三日命屏去男女正容默坐凡平時心願口諾及有貸於家人者一毫不忘使其子書識之曰以遺爾父為無恨矣夫人篤信釋氏誦其書遵其教精進持其所聞禪宗頓教見性成佛思而索之寢食都廢一日忽自喜曰吾得之矣未幾被病以故臨沒不亂夫人之死行且十年矣明甫為之未忍娶諸姒迄今言及之則為之涕下所以感人心者如此其賢孝可知已熙寧七年明甫為太子中允直集賢院兼崇政殿説書管句國子監遇郊祀追封夫人為仙源縣君有子四人男曰洪曰洞曰洋女一人在室洋出繼元豐三年五月其姑揚國太夫人楊氏薨以明年某月某日葬於揚州江都縣崑岡之陽明甫自丹徒舉夫人之柩從葬於其兆諉豫以銘銘曰巍巍昆岡其來萬里右旋左抱一伏一起博大深厚截然而止長河巨江前有吉水蒼蒼逺岫如幟如几夫人從姑歸安於此幽宅永康百世蒙祉令聞不忘視兹志巳故福昌縣太君李氏墓志銘福昌太君李氏左朝議大夫上柱國會稽縣開國子食邑五百户賜紫金魚袋夏公伯孫所生母也太君京師人幼失怙恃世失其傳以良家子婉淑端莊善言懿行聞於閭里乃歸侍於司空是時文莊公位兼將相滎國夫人肅治閨閫唯司空一人以承家事每以嗣裔未廣為念太君承上接下靡不得其歡心及生朝議喜氣溢於家庭相國滎國尤所鍾愛暨相國薨司空執喪過哀殆不能勝太君供侍持扶未嘗違去左右乃克終制太君之勤為最多朝議幼而誘以學問長而勉以政事君親教以忠孝行巳篤以信義可謂盡母道矣故朝議歷仕宦近五十年無言行之過者有所自也朝議平生不求外官以太君不欲去京師故也以元祐六年八月十七日年八十有五以疾卒於家朝議遭太君之喪號慕過哀水漿不入口者四日相繼而終母慈子孝聞者哀之太君和易誠實未嘗失色於人疾病急難必援救之唯恐其後至於僕執賤者莫不均愛焉况其子孫乎况於姻族乎孫十有四人長忱次懌皆承議郎次惇左侍禁次忭未仕次恪亦皆左侍禁次恢衢州江山簿次欣未仕次恮滑州胙城尉次慬未仕次慥太廟齋郎次忦假承務郎次愈次懷尚幼女十一人長適宗室觀察使世覃次適朝請郎龎元中次適奉議郎梁子雅次適宗室防禦使仲戡早卒次適宗室防禦使仲汾早卒次適朝奉郎李譯次適宗室團練使叔盎次適宗室右監門衛將軍仲珣早卒次適文思副使趙令昔次適宗室率府率仲擴次幼未適內外諸孫幾百人可謂盛矣以是年九月六日葬於開封府祥符縣祖塋之别域禮也銘曰子以母成母以子榮教篤忠孝天錫夀終歲月惟良掩於佳城故廬江田府君夫人趙氏墓志銘夫人其先南陽人五代之末家於濡須祖諱某倜儻有才智輕財好士搢紳樂與之遊嘗設方略擒巨盜閭里以安朝廷旌其能詔列仕版辭不願就乃以保信軍節度行軍司馬老於家考諱化成舉進士不第鄉黨以為令族夫人飭身有法度事親篤孝愛婦德充備慎擇良配長而歸於廬江田府君諱某府君博學修已皇祐中詔下郡國薦士無為以府君首冠賢能書長者之車日盈其門延接施與人慕其風夫人蓋有助焉事奉舅姑盡禮事繼姑益孝謹內外稱賢田氏大姓也其歲時祭祀婚姻禮幣賔客之奉伏臘之給皆有家法義居甚久人無間言親族鄰里有疾病急難必力以濟平居不妄語言所為循理內外稱之其為德可知矣子二人曰瓌重信義喜賓客不幸早世曰仔補上庠生有行藝女一人適鄉貢進士李從道孫幾人曰某曰某曰某曰某皆舉進士孫女幾人未嫁以某年某月某日終於家享年七十有幾卜某年某月某日葬於某鄉某原府君之塋禮也先妣長壽縣君夫人之堂姊也某仲妹夫人之冢婦也熙寧初某自黃梅令被召為禮官侍長壽過廬江見姨婦姑三世子孫滿前上下肅雍悅懌情話旬日不忍别洎元豐初銜哀過姨家是時姨服姑喪拜於堂不勝其悲姨今亡矣可勝痛哉襄事有日仔來求銘時被命典客道由淮楚故里在望不得執紼以申其哀愴乃為銘曰趙氏淑女田氏賢婦孝事舅姑如事父母蘋以為薦蘭以為佩祖先享之慶福是賚陟彼淮山南望潛邑潛不可及雪涕以泣故錢夫人墓志銘夫人錢氏其先錢塘人尚父吳越王之族年始笄而歸於吾友潘延之興嗣延之有道之士也得官不赴退居鍾陵三十年朝廷聞之召命再至固辭以母老不願仕夫人實同其志而無向榮之慕不強夫以仕此其所難也夫人性安恬事姑盡婦道教子有法度內外稱其賢因讀佛書默然有解熙寧五年九月十日坐上得疾頃刻而逝年四十有七生男子二人長曰昻前任某官仲曰羣舉進士預天府貢女子四人長適進士王深之次適國子博士張知古次適某州司户參軍趙洞一未許嫁以六年夏四月某日卜葬於西山某原昻羣其書走僕來求銘余與延之有通家之好義不得辭銘曰事姑以孝鞠幼以慈生死之際脫然不疑為有道者之妻非夫人而誰故王夫人墓志銘夫人王氏諱和其先深之饒陽人贈太師中書令兼尚書令魏國公諡惠獻諱化基之孫給事中天章閣待制諱舉元之女自惠獻公參預國政始徙家京師後為開封人夫人柔慧令淑女功婦道莫不純備父母慎擇名族良士以為之配年十有九歸于今奉議郎趙君君章事舅姑盡禮閨門肅雍內外親族稱以為法生一女子三歲而夭嘉祐二年舅駕部郎中守郢州夫人感疾卒於郢之官舍享年二十有一元祐元年冬十月葬於洛陽以祔先姑禮也銘曰嗚呼夫人肅雍賢孝歸於士夫宜壽而夭洛陽之原以卜吉兆篆刻銘章懿德永耀故朝奉郎知汝州黃府君行狀府君諱某字任道其先江夏人遭唐末之亂其族分適江南西蜀惟建安浦城為著姓雖爵位無顯而其文章行義多見稱於時曽祖元吉初以風雅名重江南仕非其志儒學傳家二子入本朝皆登進士第次子覺任殿中丞以清直聞當時儒宗如宋宣獻楊劉二內相多與唱酬搢紳傳之君之祖也考潛山先生兩舉進士不利於春官朝廷當推恩奏名而隱居求志不願就其歌詠翰墨有晉唐風格纍贈朝奉郎世積令德篤生府君府君為兒童時才識已過人及其長力學有文行為韓魏公王荆公歐陽公深所器重皇祐五年進士及第調揚州天長主簿移恩州清河令秩滿改著作佐郎知曹州濟陰縣神宗皇帝登極覃恩遷祕書丞以廣濟河決免一官魏公留守魏都薦君學行乞教授北京國子將命下丁潛山先生憂繼丁母裴氏壽安縣太君憂執喪盡禮兄弟友愛閨門肅雍士君子推以為法制終再授祕書丞監都進奏院召對除河北東路提舉常平倉就改本路轉運判官旋易西路就移陜府西路提點秦鳯等路刑獄被召赴闕未行坐舉官失當再奪祕書丞會更官制授奉議郎入尚書省任職方員外郎車駕幸省遷承議郎改三品服久之以廩稍不足乞補外乃知汝州今天子即位恩遷朝奉郎苦足疾求致仕元豐八年十二月四日卒於官舍享年六十有五先是一夕夢白雞棲於牀下語家人曰昔謝安夢白雞而死我以辛酉歲生豈吉祥耶果不起其疾娶某氏追封永安縣君再娶章氏封武寧縣君三子曰材太廟齋郎曰樞曰杞皆郊社齋郎二女長適奉議郎王續次在室恩州之清河清陽欠黃河芟草掃岸十四萬兩縣於隊長十九户下催理都水漕臺文移不絶十九户貧乏六年不能供前後長少鞭撲不勝數盡當時隊長以丁數選非以物産定故爾郡縣苦之人莫敢議君乃言於朝曰嘉祐之初河入恩州故掃岸芟草出於民者萬數今則聚而無用條其可免之十利朝廷可其奏悉蠲之魏公方執政尤稱其事初朝廷置寬恤民力司諸道遣使求民瘼有曰河朔館驛宜罷須索以寬其役君以謂河北中路傳驛嵗有遽使往來邉防休戚之所繫百須皆出於民當令百姓明具所出物數折除春夫丁役及於二稅合納之物量數放免民自樂輸矣朝廷從其議至今民以為利君在濟隂當廣濟河決危急邑人將就墊溺老幼號訴君采輿議乃決南堤以分水勢不意浸鄰田論法至重君自以長不忍貽過於下一皆引伏當時魏公吳正憲公御史中丞交章論列以為誠心愛民非有害彼之意譬如逐盜出境盜為他境之害非逐盜者之罪也曹州定陶知縣張復禮亦乞納官以贖其罪竟得末減而濟隂之民世世不忘其德至神宗朝召對上曰卿即某耶昔日濟陰之事意在恤民慰勞之甚厚君稱謝因請上留意史書上悅聽納時貴人有不喜君者君為提舉官時郡縣多不曉朝廷愛民之意過為苛刻君務為便民司農官以為沮法賴正憲辨明得免斥逐君議賑濟之術均以一路當散糧斛之數隨郡縣豐凶户口多寡增損以給民全活者衆矣河北方水災米粟踴貴市易糴官又增價以斂之民益艱食人不敢言君曰視民困苦而不救非我志也遂奏罷之鳯州有獄久不決而苦愆亢君親往決之是夕雨澤霑足人以為雨自公致也君孝於事親友愛諸弟自少文學聲名藹於士林識度高逺議論嚴正耻為阿諛取悅於人其文章翰墨為世推重文集四十卷可見其志也其為守令奉使惟務愛民以報朝廷大臣屢薦以臺閣侍從而其命數竒士論惜之平生愷悌與朋友交久而益固未嘗遽言人短而多稱揚人之所長勇於信義亷於進取毅然有古人之風某久遊門下知行義為最詳紀述善美不敢以誣謹狀宗室金紫光祿大夫檢校太子賓客右武衛大將軍秀州團練使贈鄆州觀察使追封東平侯趙公行狀曽祖諱惟忠彰化軍節度使舒國公祖諱從謹宣州觀察使宣城侯父諱世崇洺州防禦使公諱令蠙字景珍皇祐元年八月生於邸第二年四月仁宗賜名授右內率府副率明堂覃恩改左內率府率嘉祐五年改右千牛衛將軍八年英宗即位覃恩改左監門衛大將軍治平四年先帝即位改右武衛大將軍使持節濠州諸軍事濠州刺史熙寧十年改左武衛大將軍使持節秀州諸軍事秀州刺史充本州團練使其散官勳封食邑纍加至金紫光祿大夫檢校太子賓客兼御史大夫上柱國天水郡開國公食邑三千户食實封三百户元豐五年八月某日以訃聞贈鄆州觀察使追封東平侯八年三月先帝登遐詔舉葬於西京永安縣某原禮也公四歲而孤天資信厚出就外傅日誦千言諸父兄以成人期之及長博覽載籍尤專詩書通知風教之本間為篇章歌詠皇化有文集三卷傳於家每與人接則謙和雍容非禮義不道故終始無悔吝人有急難則賙之凡親戚中議論有所未決者多質於公其為人信重如此其事尊親以孝稱母福昌夫人疾寢不解衣藥必躬嘗晨昏不敢違去左右及夫人喪號慕過哀遂致危困捐館之日召諸子立於前以告之曰吾幸生宗室蒙賴纍朝德澤保奉先人祭祀至於今日不幸不得見汝等長立豈非修短有數耶吾平生無玩好唯翰墨簡册而已吾死當陳設翰墨簡册於前足矣毋以華靡為尚因索飛白筆書清白風月四字乃云此可以傳示子孫乃奄然而逝年三十有五娶陳氏封樂壽縣君子男六人長曰子渢右內率府副率次不育次子沆次子沇並三班奉職次子浣子㳘未仕女四人長適鎮戎軍判官栁棨餘未嫁嗚呼公乎太祖皇帝之六世孫中書令吳懿王之元孫舒國公之曽孫宣城侯之孫洺州防禦使之子承派天潢生長宗邸其勢豈不貴且重哉而能不驕不侈尊賢樂善存心經史敦行孝悌內為親族所愛外為搢紳所稱可謂賢公子矣而其夀不及中聞者哀之敢書其實以告有司謹狀故左藏庫使銀青光祿大夫檢校太子賔客兼御史大夫始平郡開國公馮侯墓表馮侯諱文顯字晦之太尉諡勤威魯國公之子也魯國公仕太宗真宗兩朝有勳績書於史册在師旅不忘經術而以義方傳其家侯年十一嵗而孤執喪如成人每侍公畫像號泣過哀其孝愛蓋出於天性是時家多賜金伯氏將均之侯輒不顧以書劒自與人問其故侯曰此先君所以起吾家非它資所可擬也識者竒之初以父任為右班殿直纍遷至左藏庫使銀青光祿大夫檢校太子賔客兼御史大夫騎都尉始平郡開國公食邑二千户歷任監中牟倉定州監酒稅京師南作坊唐州陳州巡檢曹州潤州滑州都監江寧府駐泊真定府路分都監江東路京西路提點刑獄府界提點諸縣公事湖北路益利路兵馬鈐轄知莫州澧州廣信軍祈州鄜州所至以亷能稱而事有條理其聽訟詳明吏畏民愛於今稱之守鄜一年遽以間局為請得嵩山崇福宫任滿朝廷除知隴州辭不赴再乞間局乃管句中嶽廟未幾乞致仕得謝元豐三年冬十有二月某日終於家享年七十有一以某年某月某日葬於開封府某縣之原祔魯公之塋禮也侯之系出施為已詳見於宣德郎張君舜民所撰墓志銘矣而其子惟寅又得侯之遺事於耆舊考之有實乃屬豫表之云侯在中牟時金水河決其勢危急太守委侯救護中夜承命即時馳白縣令啓關令不之許侯曰我寧得罪民事不可緩也乃發關而出質明堤為之固於是民免墊溺之患侯之敢為如此侯在益利路時方與客飲酒或告軍中有變乃呼出密問之云其事如此與侯共事者欲潛出偵之侯曰吾軍中無足慮者第飲酒以安人心已而果妄或請深治告者侯曰庸人無知不足深治恐來者懼而不敢言他侯之識慮如此任安惠公守曹南繩下嚴肅待侯最厚一日謂曰聞某人犯法吾欲劾治未得其實煩君伺之侯曰舉善罰罪太守之職也屬吏何與焉豈惟不敢聞命亦恐上纍公之德任公握手謝曰老夫過矣老夫過矣侯之謹厚如此鄜有盜羊殺人者案具將就刑侯初至郡疑其不實乃易獄吏而訊之云我實非盜也偶見牧羊兒死仆地馳告里長故執我又指羊羣中一羊以為我所盜者我知無以自辨敢不服罪侯察其非辜令釋去不數日旁縣獲盜羊殺人者抵罪侯之明斷如此昔太尉魯公嘗開國於始平至是侯實繼之克承厥家世濟其美大丞相王荆公為撰魯公神道碑云刻碑墓門公實有子蓋有自矣侯之孝愛出於天性又其亷能敢為謹厚識慮明斷皆可書也作馮侯墓表亷君四行述君諱惟德字天輔以慕尚賢者教育子弟為樂有某氏為盜而去後雖得其實而以盜有老母故不白於公及盜敗而自陳人始知之嘗出遇兼金於道委之而去其主反得之生平好行惠而不圖其報此山陽之人所共稱也余既得其實故述之云子弟庠校訓育仁孝維君之教夜盜之去得實勿訴維君之恕道金且兼勿拾而貪維君之亷有行其惠勿心其利維君之施教兮恕兮亷兮施兮鄉黨所推豫而既聞嗟不識君述之以文無為集卷十四

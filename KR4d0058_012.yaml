  - {type: page-break, offset: 0, content: '', id: KR4d0058_WYG_012-1a, image: WYG1099/WYG1099-0745a.png}
body:
  text: 無為集卷十二宋楊傑撰碑志故武信軍節度使諡康簡追封循國公神道碑寶元二年秋七月辛丑宗室金紫光祿大夫檢校禮部尚書使持節和州諸軍事和州刺史充本州團練使兼御史大夫上柱國天氷郡開國公薨於秦邸之正寢上聞之震悼車駕臨奠親撫衾斂哀慟久之慰恤諸孤恩禮加等贈武信軍節度使追封循國公特賜白金三千兩緡錢一百五十萬絹五百匹命使監護及遣內省夫人中貴恤治內外事用度悉出於官太常用一品鹵簿儀衛以送喪物窆於奉先佛祠諸子號慕過哀乞廬其側至某年某月某日葬於某州某縣某原禮也太常議諡以謂公質直重厚志尚敦雅下賢趨善素履安夷和柔之德中外推挹案諡法曰溫良好樂曰康平易不訾曰簡尚書省集官考覆輿論為允乃諡曰康簡易名之典兼二法之美也公諱承慶字祐之初名承宗宣祖皇帝之曽孫太師尚書令秦悼王諱某之適長孫護國軍節度使兼中書令高密郡慈惠王諱某之適長子也公天資忠孝才藝超卓器識宏逺信厚愷悌世以賢公子稱之雍熙中隨侍高密王出判濟州淳化二年奉宣補衙內指揮使每入貢至京師太宗必召至禁中詢訪州郡風俗山水應對詳敏莫不稱㫖因改今名乃授西頭供奉官時濟州囹圄屢空監郡劉䝉叟敷奏上喜顧左右曰承慶父子曉事盡心公家因賜金箱玉弓二寶帶以寵之濟州舉人程文應格者多高密王欲盡薦於朝有司以解額難之王曰賢者太平嘉瑞文王以多士寧周薦賢乃諸侯之職於是具奏盡數貢於春官至今濟州薦送之數比旁郡為優自高密王始也公與有力焉孔子曰聽訟吾猶人也必也使無訟乎書曰野無遺賢傳曰孝子成父之美公父子見之矣真宗皇帝祥符四年扈蹕汾陰改東頭供奉官七年改內殿崇班恭謝天地禮成加銀青光祿大夫檢校太子賔客兼御史大夫騎都尉十八年上王皇尊號加金紫光祿大夫改內殿承制天禧元年合祭天地加天水縣開國男食邑三百户二年秋八月立皇子升王為皇太子授內園副使三年南郊加檢校左散騎常侍進封開國子加食邑三百户乾興元年二月皇帝御正陽門加食邑三百户上因曲宴謂諸宗室曰汝等在先朝所歷事節宜各盡所見奏聞公曰先朝事節備於政要臣嘗扈從車駕封太山祀汾陰朝謁陵寢幸亳社巡守澶淵以至大酺可謂盛事皆所親見上曰更記內家甚事無所諱避切欲聞也公曰容臣退而編録上進旬日具所見聞進呈御札褒稱仍許非時上章公於朝政所補非一而其藁不存於家其慎密如此傳曰古者造辟而言詭辭而出公之謂也車駕幸後苑賞花釣魚翌日宗室入謝上曰卿等賞釣樂乎衆曰甚樂公獨曰臣一憂一樂左右皆愕然失色上曰大王何所憂曰臣昨日伏見御幄臨淵侍從數百人側立危欄之上臣不敢不憂既而龍輿回轅賞花宴集上下同歡詠歌太平時當豐稔和氣充塞臣不得不樂上顧近戚曰大王愛我如此卿等可學即命取白羅扇御飛白書承慶祐之四字以賜焉夫危樓船以忠諫漢史稱之寵華衮以褒字魯史載之公有臨淵之憂帝有書扇之賜忠以愛君褒以勸善君臣之道可謂盡矣它日宣射上曰先朝多以卿為神射今日期必中鵠公曰臣實無能偶或有中公拜命發箭雖不出正然皆不敢近鵠上知公之謙抑乃索御箭連中鵠是時御雙箭處中央公雙箭在下正上下相向端直如繩墨瞻者莫不歎仰帝甚恱賜對衣金帶鞍轡馬各二詔書褒異之詩云終日射侯不出正兮易云勞謙君子有終吉公得之矣仁宗皇帝即位授內藏庫使加輕車都尉封天水郡開國侯食邑三百户天聖二年恭謝天地加上輕車都尉五年十一月南郊加護軍食邑三百户七年九月朝廷敦叙昭武之裔優推寵命以公乃宣祖皇帝之曽孫秦王之適長孫高密郡王之適長子故特持節蔣州諸軍事蔣州刺史八年南郊加上護軍進封開國公食邑三百户明道元年改宫苑使檢校禮部尚書加柱國二年三月東郊籍田加上柱國食實封一百户是歲特授懷州刺史景祐元年公以足疾賜告調治二年南郊遷和州團練使加食邑五百户寶元元年南郊加食邑食實封二百户公養疾六載聖眷益隆既宣太醫朝夕診療乂時遣內夫人至第撫問非常禮也章獻明肅皇太后臨朝時以公名下一字犯彭城郡王父名欲令改易遣近侍諭之不從一日召於簾前宣問公曰彭城王諱天下所共諱也臣不敢不諱彭城王父諱非天下所共諱也臣不敢獨諱且臣名先朝所賜安敢私易以諂上識者義之公生平博覽墳典翰墨精妙以至樂律丹術仙録莫不洞究尤善屬文嘗注易二十卷極天人性命之理天子覽而嘉歎賜以金幣又著家訓三卷行於世國朝以來宗室著述自公始也因真宗違豫公刺血書佛經以進高密王寢疾不脫冠帶而養上聞之遣內人撫問厚賜以旌過人之行及扶護先王喪往葬汝州㑹天旱井涸公夜致禱明日乃水泉涌出賜詔稱其誠孝之應經曰事親孝故忠可移於君孝悌之至通於神明於公見之矣公享年三十有九夫人涇陽郡君乃中書令和凝之孫也繼室永嘉郡君虞氏皆賢懿有輔佐君子之道子六人曰克悟右班殿直早世曰克繼贈定武軍節度使開府儀同三司建國公曰克絢贈青州觀察使曰克孝今任越州管內觀察使曰克肖贈右監門衛大將軍曰克顧贈昭化軍節度使女十人封號不同各歸顯族一早世一為比丘尼孫幾人曽孫幾人任某官公教子不以爵祿為重而重乎忠孝不以貨財為傳而傳以經術是以太宗朝諸王出鎮藩郡以公父子為才能真宗訪政事公獻忠言為多仁宗試文翰詔稱公子克孝秀出本支英宗立宗學教育親族克孝首為二宗師儒稱薦而復中上科神宗朝克孝著孝經傳上進賜詔稱諭熙寧以來詔試宗室經術公孫叔敖叔彖叔某叔某相繼登第元豐講行祀典擇宗子之無過尤者躬執事於明堂宗廟是時循國子孫與祭者為最多議者以為無是父則無是子無是祖則無是孫豫觀循國康簡公家訓三篇上篇述祖考昭穆之序陳忠孝禮義之端集古人法語以為家世之傳中篇篤勵學問慎修言行重道義而輕富貴下篇言所慎在乎九思正心以正身正身以正家仁而尊賢恕以及物具善不善之積明德不德之效於今子孫不忘其訓然後知義方之教澤流之逺何時而有窮已哉葬後四十年公子欲以公之善美昭示來世乃具行實請文以立碑於隧道銘曰於戲循國宗室之英忠孝仁厚愷悌信誠博學多能秉彛典經左右先王政肅刑清進賢報國邦乂以寧錫以寶帶父子寵榮諫章慎密聖主從繩勞謙終吉射不出正天旱井涸葬親汝城精禱泉湧感於神明天子聞之詔褒以旌曰康曰簡懿哉易名治家訓言載之簡編貽於後昆忠孝之源公子公孫世其稱賢寵祿令問傳無窮年故右諫議大夫贈工部侍郎沈公神道碑沈氏之先出於周文王之子聃季食采於沈因而命氏漢光祿勳戎徙居㑹稽之烏程後改烏程為吳興郡故沈氏以吳興為望由漢以來世為右族宋有慶之梁有休文至唐潤州司兵參軍岌生愈為懷州都團練判官愈生僎為同州馮翊尉僎生師舉為太常協律郎師舉生籍為衢州常山令諱籍即公之高祖考越州剡縣丞諱德饒公曽祖考也海州胊山令諱仁諒公祖考也贈工部尚書諱平公烈考也太夫人胡氏封安定郡太君自朐山令徙居歷陽今為歷陽人源流深逺慶德相承篤生良臣器識宏博公諱立字立之少孤力學事母至孝鞠育諸弟率以懿行鄉閭耆艾推以為法文詞敏贍場屋有時名天聖中登進士第歷任桐城尉畿縣主簿知績溪洪雅二縣通判壽州益州知池州杭州越州江寧府宣州滄州入為三司户部鹽鐵判官判都水監知審官西院出為淮南轉運副使兩浙京西河北都轉運使充江淮兩浙荆湖六路都大制置發運使提舉商胡掃提舉崇禧觀以老焉由大理寺丞殿中丞太常博士厯屯田都官職方三員外郎兵部郎中太常少卿集賢殿修撰右諫議大夫贈工部侍郎公自初仕已能夙夜勤職亷義自持孜孜民事以報國家故所至郡縣為部使者皆以才稱公尉桐城盜不入境主畿內簿吏不敢欺治小邑皆興學舍在商胡采托大河事迹古今利病曰河防通議世之治河者取以為據嘗遇蘇湖大水民多艱食公為發倉廪出餘財選擇部吏分主賑貸時諸縣有率大姓出粟為助者公曰官廩充牣烏用擾民悉還給之若積粟之家能自貸借下户者候其豐歲官為理償民以為便存活甚衆初領朔方漕陛辭日英宗皇帝曰知卿用心公家故召卿經畫邊事慎勿張皇公遍歷邊郡經度處置人不以為疑蓋能承上意也公總外計舊號冗劇施設皆有條理於是綱吏絶僥幸之望疲兵無凍餒之苦金帛豐羡倉廩充溢天子聞而嘉之因奏計上從容慰諭云知卿素有才力更宜為朕用心及存問家屬諸屬子次第續遣中使賜中金二百兩以優其勞鎮金陵日上曰以卿清慎公勤故以重地委卿問所藏書令進所編名山都水記三百卷并家藏書目乃賜詔書敦奬公為北朝正旦國信使是歲契丹行册禮遣儐介曰能同北朝百官之服則入見不爾當叙班門外公正色曰逺銜君命以通兩國之好安可門外見耶頃者迓北使到闕㑹本朝元㑹之禮亦未嘗命北使易衣冠常禮不可遽易敵人無以答遂以常服入焉使還賜金紫旌其不辱命也公嘗撰茶法易覽具述茶之利害於今著以為令熙寧二年當轉對力言邪正治亂之道語甚切直識者知其所存公事三朝白首一節生平樂經史手不釋卷自奉甚約其稍廪之餘皆供紙札之費故藏書埒於內府纍降中㫖就其第傳録以補官書之闕自元獻晏公而下卿士大夫有歌詩序記百餘篇以美其嘉尚既退歸歷陽嘗曰吾起家寒素仕宦至兩省藏書三萬卷以遺子孫年餘七十而支體康寧是無一不如意也唯日與賔朋詩酒為樂所著名山都水記茶法易覽河防通議鹽策總類賢牧傳稽正辨訛香譜錦譜洎文集共四百卷公治家有法度教子有義方故內外雍肅諸子篤學所至有能聲皆其善教之致也娶夫人吳氏封濮陽郡君繼娶夫人董氏封仁壽郡君男六人長安國次安民早卒次安道次安上次安節次安禮女四人長適進士朱延之次適宣州旌德縣尉曲師德次適祕書丞裴維甫次適濠州司法丁源並早卒孫男十四人慶孫壽孫孝孫並試將作監主簿餘尚幼孫女三人公既薨樞密直學士錢公為銘以納於壙中其後鄉人耆舊懷公之德過公墓下則肅然致敬其孤請豫文以書於碑其銘曰沈氏之源濬於吳興㑹稽東陽令聞繼承逮於朐山政肅典刑德積慶餘我公以生起家文儒䇿科帝廷筮仕甸畿夙夜靡寧宰牧觀風若權在衡進秩侍從始終不傾㑹計外內轉輸富盈孝友於家接物信誠利在邦國愛均編氓典領都水濬治有經民乃奠居以耨以耕審官進賢公哉黜升奉幣出疆煜煜旄旌華服不易憲度是憑不辱君命正色北廷書載史官炳然丹青功成願歸請符金陵天子曰嘻詔其屢登昌言啓沃衮章其榮惠浹政行鎮移宣城囊封乞身掛冠林坰天子念勞嗟其頽齡俾奉琳宫燕閒紫清歸老歷陽錦繡耀榮稚耋歡呼豆觴出迎公還舊廬樂康且寧書三萬卷充屋架楹以示子孫不傳金籯壽乎有窮不朽者名民懷其德烹牲薦馨道左豐碑信辭是銘故通議大夫慎公墓志銘公諱皓字仲素為吳越著姓後居三衢曽祖諱知禮工部侍郎贈左僕射祖諱從吉給事中贈工部尚書父諱鈞大理寺丞贈尚書屯田員外郎尚書娶錢氏忠懿王之女公其長子也初命試祕書省校書郎遷國子監主簿太常寺奉禮郎詣闕上書賜五品服歷衛尉光祿大理殿中丞國子博士入省為庫部水部司門員外郎遷三部郎中知竇州通判邵州擢知楚州海州以嘉祐四年夏四月戊子終於山陽享年六十有三至七年秋八月歸葬於開封府開封縣蘇封之先塋夫人馮氏先公而終銘以祔焉公初守竇竇素無兵備交趾蠻僚數百人暴至城下城中擾攘計無所出公曰賊勢方鋭守與戰皆不可因設疑兵被甲持滿傳呼開城門金鼓大作賊望風遁去使者上章稱之賜金紫邵有溪洞酋首龔行詳者恃險恣暴前後吏莫能禁公通守是郡命捕以戮內外畏服公亷正自持不妄喜怒其貌甚溫臨事毅然有不可犯之色守山陽以母喪去官富人有以重幣為賻者公曰吾家以清白相傳急持去無汙我仕宦四十年及終無負郭之田環堵之室以遺其子孫人以為難樞密田公况內相王公洙知公甚深以為其才可備臺省力言於朝其後名臣交章薦舉自二公始也子男三人宗傑見任朝奉大夫才識公亷有家世之風自升朝纍贈公至通議大夫宗道宗誨有學行皆早世女子四人皆出適孫瓛太廟齊郎修潔有文早世大夫以銘見託銘曰慎氏之源發東陽三衢分秀派益長祖禰顯仕煒有光通議入省為名郎應機破賊保土疆屏惡扶善稱循良傳家清白著義方子孫承繼百世昌故通直郎簽書商州軍事判官㕔公事謝君墓志銘君諱季康字和卿其先河朔人世力田高祖諱鳬始以儒學自立晉開運中明經中第至周任瀛州録事參軍贈國子博士曽祖諱成之皇朝任屯田員外郎贈主客郎中祖諱師顔都官員外郎贈吏部尚書父諱􅎡朝議大夫三世皆進士及第自主客游宦京師寓居潁昌之陽翟後為陽翟人宋元憲景文文章學術為天下宗師女弟臨洺君博學能文賢而有識君之母也知其子可以託門户臨終以屬舅氏元憲元憲亦素愛君孝友介潔每謂人曰真吾甥也及在政府奏授祕書省正字非所好也與其兄公儀熙序益勤於學偕有聞於時久之調徐州司户參軍海州司法參軍君為掾常以法自持未嘗少屈於權貴聞者危之而志不可奪用薦者移朐山令丁繼母陳夫人憂執喪盡禮服除授西平令通山令改大理丞監大名府經城酒稅㑹官制行遷通直郎簽書商州判官廳公事時朝議高年君願解官就養朝議固止之君不忍去膝下遲遲其行宛丘太守周革謂君曰尊君年雖高而康强過人君家貧族衆當勉力從仕以承親意安可衣食於親以就養乎君不得已而之官及親有疾即解職歸謁未報聞訃至僚友知君之貧有以資其行者君力拒不受奔喪哭不絶聲水漿不入口者纍日既克葬後三日而卒即元豐六年十一月二十三日也享年五十有七君幼而好學弱不好㺯行已清直事親孝恭朋友尚信蒞官守正不為勢屈命雖數竒未嘗諂以事上家雖甚窶未嘗躁而有求故所至有令聞朝廷大臣如太師潞國文公翰林侍讀學士劉公樞密直學士陳公皆深知君之所存前一夕其弟文瓘夢君綵服簮紳曳履袖文書以告之曰豫平昔之事汝其為我著之逮旦君逝矣娶劉氏屯田員外郎異之女有子五人長曰收中進士甲科河南府推官次早夭次揚次攽次敷皆力學遵義方之訓女二人長適渭州華亭縣丞劉逢明次適進士方增孫男一人以元祐八年四月二十四日卜葬於汝州郟城縣安良原先塋之次禮也吾友太中大夫致仕宋盈祖乃能道君所存求豫為銘銘曰行過乎恭喪過乎哀觀而知仁斯賢人哉無為集卷十二
